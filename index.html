<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rört Calendar</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #c4a35a;
    --free: #1b3a1b;
    --free-border: #2d5a2d;
    --event-bg: #2a1f3d;
    --event-border: #4a3a6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--accent);
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: inline-block;
  }
  .btn:hover { border-color: var(--accent); }

  #csv-upload { display: none; }

  /* Main layout: sidebar + main */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .month-nav h2 {
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }
  .month-nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    border-radius: 4px;
  }
  .month-nav button:hover { background: var(--bg); color: var(--accent); }

  .mini-cal {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 14px;
  }
  .mini-cal .dow {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0;
    font-weight: 600;
  }
  .mini-cal .day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    padding-top: 3px;
    user-select: none;
  }
  .mini-cal .day:hover { background: var(--bg); }
  .mini-cal .day.empty { visibility: hidden; cursor: default; }
  .mini-cal .day.muted { color: var(--text-muted); opacity: 0.4; }
  .mini-cal .day.in-range { background: rgba(196, 163, 90, 0.08); }
  .mini-cal .day.selected { background: var(--accent); color: #000; font-weight: 700; }
  .mini-cal .day.today { box-shadow: inset 0 0 0 1px var(--accent); }
  .mini-cal .day .dots { display: flex; gap: 2px; margin-top: 1px; height: 3px; }
  .mini-cal .day .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); opacity: 0.7; }
  .mini-cal .day.selected .dot { background: #000; opacity: 1; }

  .sidebar-section {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .loc-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }
  .loc-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .loc-toggle.active {
    border-color: var(--accent);
    background: rgba(196, 163, 90, 0.1);
  }
  .loc-toggle input { display: none; }

  .free-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    user-select: none;
  }
  .free-toggle.active {
    border-color: var(--free-border);
    background: var(--free);
  }
  .free-toggle input { display: none; }

  /* Main content */
  .main { display: flex; flex-direction: column; min-height: 0; }

  .main-toolbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .range-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .range-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .range-nav button:hover { border-color: var(--accent); }
  .range-label {
    font-size: 15px;
    font-weight: 600;
    min-width: 220px;
    text-align: center;
    color: var(--text);
  }
  .today-pill {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .view-mode {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-left: auto;
  }
  .view-mode button {
    background: var(--bg);
    border: none;
    color: var(--text-muted);
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .view-mode button.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .calendar-container {
    overflow: auto;
    flex: 1;
    min-height: 0;
  }

  /* Day view grid */
  #day-header { padding: 0 20px; min-width: 600px; }
  .day-calendar-wrap { padding: 16px 20px; }
  .day-grid { display: grid; gap: 0; min-width: 600px; position: relative; }
  .col-header {
    background: var(--surface);
    padding: 10px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    color: var(--accent);
  }
  .time-label {
    background: var(--surface);
    padding: 4px 8px;
    font-size: 12px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    text-align: right;
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .hour-cell {
    border: 1px solid var(--border);
    min-height: 28px;
    position: relative;
  }
  .hour-cell.free-highlight { background: var(--free); }

  .event-block {
    position: absolute;
    left: 2px;
    right: 2px;
    background: var(--event-bg);
    border-left: 3px solid var(--event-border);
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    cursor: pointer;
    z-index: 1;
    transition: filter 0.15s;
  }
  .event-block:hover { filter: brightness(1.3); z-index: 3; }
  .event-block .event-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-block .event-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .event-block .event-room { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-block .event-instructor { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Week view grid */
  #week-header { padding: 0; min-width: 900px; }
  .week-grid-wrap { padding: 0 0 16px; }
  .week-grid {
    display: grid;
    grid-template-columns: 64px repeat(7, 1fr);
    min-width: 900px;
  }
  .week-day-header {
    background: var(--surface);
    padding: 10px 6px;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .week-day-header:hover .wk-date { color: var(--accent); }
  .week-day-header .wk-dow { font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; font-weight: 600; }
  .week-day-header .wk-date { font-size: 20px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .week-day-header.today { box-shadow: inset 0 -3px 0 var(--accent); }
  .week-day-header.today .wk-date { color: var(--accent); }
  .week-corner {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .week-time-cell {
    background: var(--surface);
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    border-top: 1px solid var(--border);
    text-align: right;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .week-day-col {
    border-right: 1px solid var(--border);
    border-top: 1px solid var(--border);
    position: relative;
  }
  .week-day-col.today { background: rgba(196, 163, 90, 0.03); }
  .week-day-col .half-tick {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px dashed var(--border);
    opacity: 0.4;
    pointer-events: none;
  }
  .week-event {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 3px;
    padding: 3px 5px;
    font-size: 10px;
    line-height: 1.25;
    overflow: hidden;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .week-event:hover { filter: brightness(1.3); z-index: 5; }

  /* Event color palette */
  .event-block[data-color="0"], .week-event[data-color="0"] { background: #2a1f3d; border-left: 3px solid #7c5cbf; }
  .event-block[data-color="1"], .week-event[data-color="1"] { background: #1f2a3d; border-left: 3px solid #5c8abf; }
  .event-block[data-color="2"], .week-event[data-color="2"] { background: #3d2a1f; border-left: 3px solid #bf7c5c; }
  .event-block[data-color="3"], .week-event[data-color="3"] { background: #1f3d2a; border-left: 3px solid #5cbf7c; }
  .event-block[data-color="4"], .week-event[data-color="4"] { background: #3d1f2a; border-left: 3px solid #bf5c7c; }
  .event-block[data-color="5"], .week-event[data-color="5"] { background: #2a3d1f; border-left: 3px solid #8abf5c; }
  .event-block[data-color="6"], .week-event[data-color="6"] { background: #3d3d1f; border-left: 3px solid #bfbf5c; }
  .event-block[data-color="7"], .week-event[data-color="7"] { background: #1f3d3d; border-left: 3px solid #5cbfbf; }
  .event-block[data-color="8"], .week-event[data-color="8"] { background: #2d1f3d; border-left: 3px solid #9a5cbf; }
  .event-block[data-color="9"], .week-event[data-color="9"] { background: #3d1f3d; border-left: 3px solid #bf5cbf; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 420px;
    width: 90%;
    position: relative;
  }
  .modal h2 { font-size: 18px; color: var(--accent); margin-bottom: 16px; }
  .modal .detail-row {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .modal .detail-row:last-child { border-bottom: none; }
  .modal .detail-label {
    color: var(--text-muted);
    min-width: 90px;
    font-weight: 500;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  /* ==================== Proposal blocks (day view overlays) ==================== */
  .proposals-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
  }
  .proposal-block {
    --prop-color: #c4a35a;
    position: absolute;
    background: color-mix(in srgb, var(--prop-color) 12%, transparent);
    border: 1.5px dashed var(--prop-color);
    border-radius: 3px;
    padding: 4px 5px 3px 25px;
    font-size: 10px;
    color: var(--prop-color);
    opacity: 0.95;
    overflow: hidden;
    line-height: 1.2;
    pointer-events: auto;
    min-width: 0;
  }
  .proposal-block .match-num {
    position: absolute;
    top: 3px;
    left: 3px;
    background: var(--prop-color);
    color: #0f0f0f;
    font-size: 10px;
    font-weight: 700;
    width: 17px;
    height: 17px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .proposal-block .proposal-time {
    font-size: 10px;
    color: var(--prop-color);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Narrow variant: when proposals are side-by-side in the same room,
     stack the start/end timestamps on separate lines below the badge
     (the single-line "18:15–20:45" format won't fit in the narrow sub-column). */
  .proposal-block.narrow {
    padding: 22px 4px 3px 4px;
  }
  .proposal-block.narrow .proposal-time { line-height: 1.15; }
  .proposal-block.narrow .proposal-time > span { display: block; }
  .proposal-block.narrow .proposal-time .t-sep { display: none; }
  .proposal-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .proposal-line {
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
    fill: none;
    opacity: 0.8;
  }

  /* ==================== Find view ==================== */
  .main-toolbar.find-mode .range-nav,
  .main-toolbar.find-mode .range-label { display: none; }

  #find-container {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .find-panel {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .steps-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .search-step {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .search-step .step-label {
    color: var(--accent);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .search-step .room-tags {
    display: inline-flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .room-tag {
    background: rgba(196, 163, 90, 0.12);
    border: 1px solid rgba(196, 163, 90, 0.35);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .room-tag-x {
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    line-height: 1;
  }
  .room-tag-x:hover { color: var(--text); }
  .search-step .room-select {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .search-step input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 12px;
    font-family: inherit;
    text-align: center;
  }
  .search-step .remove-step {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    font-family: inherit;
  }
  .search-step .remove-step:hover { color: var(--text); }
  .step-sep {
    color: var(--text-muted);
    font-size: 11px;
    font-style: italic;
    padding: 0 4px;
  }
  .add-step {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 4px 10px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .add-step:hover { color: var(--accent); border-color: var(--accent); }

  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .filter-row .fl {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .filter-row select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
  }
  .filter-row input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 11px;
    text-align: center;
    font-family: inherit;
  }
  .filter-row .divider {
    width: 1px;
    height: 16px;
    background: var(--border);
  }
  .day-checks {
    display: inline-flex;
    gap: 3px;
  }
  .day-check { cursor: pointer; user-select: none; }
  .day-check input { display: none; }
  .day-check span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
  }
  .day-check input:checked + span {
    background: rgba(196, 163, 90, 0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .reverse-check {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-size: 11px;
    user-select: none;
  }
  .filter-row .spacer { flex: 1; }
  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 5px 14px;
    border-radius: 5px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
  }
  .search-btn:hover { filter: brightness(1.1); }
  .clear-link {
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 0 4px;
  }
  .clear-link:hover { color: var(--text); }

  .list-scope {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .scope-tabs { display: inline-flex; gap: 4px; }
  .scope-tabs span {
    padding: 2px 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    font-size: 12px;
  }
  .scope-tabs span:hover { color: var(--text); }
  .scope-tabs span.on {
    background: rgba(196, 163, 90, 0.12);
    border-color: rgba(196, 163, 90, 0.35);
    color: var(--accent);
  }
  .list-scope .count {
    margin-left: auto;
    color: var(--accent);
    font-weight: 600;
    font-size: 12px;
  }

  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .results-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .day-group { padding: 14px 20px 4px; }
  .day-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .day-head .dow {
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;

</style>

<body>

<script>
// ---------- State ----------
let events = [];
let locations = [];
let visibleLocations = new Set();
let highlightFree = false;
let classColors = {};
let colorIndex = 0;

// Current date cursor (ISO yyyy-mm-dd). Defaults to today.
let currentDate = todayIso();
// View mode: 'day' | 'week' | 'find'
let viewMode = 'week';
// Month currently displayed in the sidebar (1st of month as ISO)
let sidebarMonth = firstOfMonth(currentDate);

// ---------- Compound search state ----------
let searchScope = '2weeks';           // 'week' | '2weeks' | 'all'
let compoundSearchActive = false;
let compoundSearchResults = new Map(); // date -> array of match-paths, each path = [{room,start,end}, ...]
let findViewInitialized = false;

// ---------- Date helpers ----------
function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseIso(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}
function toIso(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(iso, n) {
  const d = parseIso(iso);
  d.setDate(d.getDate() + n);
  return toIso(d);
}
function mondayOf(iso) {
  const d = parseIso(iso);
  // JS Sunday=0, we want Monday=0
  const dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  return toIso(d);
}
function firstOfMonth(iso) {
  const d = parseIso(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function addMonths(iso, n) {
  const d = parseIso(iso);
  d.setMonth(d.getMonth() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function daysInMonth(iso) {
  const d = parseIso(iso);
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function formatLongDay(iso) {
  return parseIso(iso).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function formatWeekRange(mondayIso) {
  const a = parseIso(mondayIso);
  const b = parseIso(addDays(mondayIso, 6));
  const sameMonth = a.getMonth() === b.getMonth();
  const aLbl = a.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const bLbl = sameMonth
    ? b.toLocaleDateString('en-US', { day: 'numeric' })
    : b.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${aLbl} – ${bLbl}, ${b.getFullYear()}`;
}
function formatMonth(iso) {
  return parseIso(iso).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getColor(className) {
  if (!(className in classColors)) {
    classColors[className] = colorIndex % 10;
    colorIndex++;
  }
  return classColors[className];
}

// ---------- Data loading ----------
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  const parsed = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === ',' && !inQuotes) { vals.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    vals.push(current.trim());
    const obj = {};
    headers.forEach((h, idx) => obj[h.trim()] = vals[idx] || '');
    parsed.push(obj);
  }
  return parsed;
}

async function loadInitialData() {
  const files = Array.from({ length: 11 }, (_, i) => `data/rort_schedule_week${i + 1}.csv`);
  for (const file of files) {
    try {
      const resp = await fetch(file);
      if (resp.ok) {
        const text = await resp.text();
        addEvents(parseCSV(text));
      }
    } catch (e) { /* skip */ }
  }
}

function addEvents(newEvents) {
  events = events.concat(newEvents);
  const locSet = new Set();
  events.forEach(e => locSet.add(e.Room));
  locations = Array.from(locSet).sort();
  if (visibleLocations.size === 0) visibleLocations = new Set(locations);
  else locations.forEach(l => visibleLocations.add(l));

  // Ensure currentDate is within known data; if not, snap to closest known date.
  const dates = events.map(e => e.Date).sort();
  if (dates.length) {
    if (currentDate < dates[0]) currentDate = dates[0];
    if (currentDate > dates[dates.length-1]) currentDate = dates[dates.length-1];
    sidebarMonth = firstOfMonth(currentDate);
  }

  buildLocationControls();
  render();
}

// ---------- Controls ----------
function buildLocationControls() {
  const container = document.getElementById('location-toggles');
  container.innerHTML = '';
  locations.forEach(loc => {
    const label = document.createElement('label');
    label.className = 'loc-toggle' + (visibleLocations.has(loc) ? ' active' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = visibleLocations.has(loc);
    cb.addEventListener('change', () => {
      if (cb.checked) visibleLocations.add(loc);
      else visibleLocations.delete(loc);
      label.classList.toggle('active', cb.checked);
      render();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(loc));
    container.appendChild(label);
  });
}

// ---------- Mini calendar ----------
function eventsPerDate() {
  const map = {};
  events.forEach(e => {
    if (!visibleLocations.has(e.Room)) return;
    map[e.Date] = (map[e.Date] || 0) + 1;
  });
  return map;
}
function densityDots(n) {
  if (!n) return 0;
  if (n <= 2) return 1;
  if (n <= 5) return 2;
  return 3;
}

function renderMiniCal() {
  document.getElementById('month-label').textContent = formatMonth(sidebarMonth);
  const container = document.getElementById('mini-cal');
  container.innerHTML = '';

  // DOW headers (Mon-first)
  ['M','T','W','T','F','S','S'].forEach(s => {
    const el = document.createElement('div');
    el.className = 'dow';
    el.textContent = s;
    container.appendChild(el);
  });

  const first = parseIso(sidebarMonth);
  const firstDow = (first.getDay() + 6) % 7; // Mon=0
  const dim = daysInMonth(sidebarMonth);
  const year = first.getFullYear();
  const month = first.getMonth();

  // Leading empty cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    container.appendChild(el);
  }

  const counts = eventsPerDate();
  const weekStart = viewMode === 'week' ? mondayOf(currentDate) : null;
  const weekEnd = weekStart ? addDays(weekStart, 6) : null;

  for (let d = 1; d <= dim; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'day';
    if (iso === todayIso()) cell.classList.add('today');
    if (iso === currentDate) cell.classList.add('selected');
    if (viewMode === 'week' && iso >= weekStart && iso <= weekEnd && iso !== currentDate) {
      cell.classList.add('in-range');
    }
    const hasAny = !!counts[iso];
    if (!hasAny) cell.classList.add('muted');

    const num = document.createTextNode(String(d));
    cell.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'dots';
    const dotCount = densityDots(counts[iso] || 0);
    for (let i = 0; i < dotCount; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot';
      dots.appendChild(dot);
    }
    cell.appendChild(dots);

    cell.addEventListener('click', () => {
      currentDate = iso;
      sidebarMonth = firstOfMonth(iso);
      render();
    });
    container.appendChild(cell);
  }
}

// ---------- Main render dispatch ----------
function render() {
  renderMiniCal();
  document.getElementById('view-day').classList.toggle('active', viewMode === 'day');
  document.getElementById('view-week').classList.toggle('active', viewMode === 'week');
  document.getElementById('view-find').classList.toggle('active', viewMode === 'find');
  document.getElementById('week-container').style.display = viewMode === 'week' ? '' : 'none';
  document.getElementById('day-container').style.display = viewMode === 'day' ? '' : 'none';
  document.getElementById('find-container').style.display = viewMode === 'find' ? '' : 'none';
  document.querySelector('.main-toolbar').classList.toggle('find-mode', viewMode === 'find');
  if (viewMode === 'week') renderWeekView();
  else if (viewMode === 'day') renderDayView();
  else renderFindView();
}

// ---------- Week view ----------
function renderWeekView() {
  const container = document.getElementById('week-grid');
  const header = document.getElementById('week-header');
  const weekStart = mondayOf(currentDate);
  document.getElementById('range-label').textContent = formatWeekRange(weekStart);

  const minHourDefault = 6, maxHourDefault = 22;
  let minHour = minHourDefault, maxHour = maxHourDefault;

  const days = Array.from({length: 7}, (_, i) => addDays(weekStart, i));
  const weekEvents = events.filter(e =>
    days.includes(e.Date) && visibleLocations.has(e.Room)
  );
  weekEvents.forEach(e => {
    const sH = Math.floor(timeToMinutes(e.Start) / 60);
    const eH = Math.ceil(timeToMinutes(e.End) / 60);
    if (sH < minHour) minHour = sH;
    if (eH > maxHour) maxHour = eH;
  });

  const rowsPerHour = 2; // 30-min rows
  const pxPerRow = 28;   // row height
  const pxPerHour = pxPerRow * rowsPerHour;
  const totalRows = (maxHour - minHour) * rowsPerHour;
  const colHeight = totalRows * pxPerRow;

  // Header row
  header.innerHTML = '';
  const headerGrid = document.createElement('div');
  headerGrid.style.display = 'grid';
  headerGrid.style.gridTemplateColumns = `64px repeat(7, 1fr)`;
  headerGrid.style.minWidth = '900px';

  const corner = document.createElement('div');
  corner.className = 'week-corner';
  corner.style.padding = '10px 6px';
  headerGrid.appendChild(corner);

  const today = todayIso();
  days.forEach(iso => {
    const d = parseIso(iso);
    const h = document.createElement('div');
    h.className = 'week-day-header' + (iso === today ? ' today' : '');
    const dow = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    const date = d.getDate();
    h.innerHTML = `<div class="wk-dow">${dow}</div><div class="wk-date">${date}</div>`;
    h.addEventListener('click', () => {
      currentDate = iso;
      viewMode = 'day';
      render();
    });
    headerGrid.appendChild(h);
  });
  header.appendChild(headerGrid);

  // Body grid
  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'week-grid';
  grid.style.gridTemplateRows = `repeat(${totalRows}, ${pxPerRow}px)`;

  // Time labels column (spans 2 rows per hour)
  for (let hr = minHour; hr < maxHour; hr++) {
    const slot = (hr - minHour) * rowsPerHour;
    const t = document.createElement('div');
    t.className = 'week-time-cell';
    t.textContent = `${String(hr).padStart(2,'0')}:00`;
    t.style.gridRow = `${slot + 1} / ${slot + 3}`;
    t.style.gridColumn = '1';
    grid.appendChild(t);
  }

  // Day columns
  days.forEach((iso, i) => {
    const col = document.createElement('div');
    col.className = 'week-day-col' + (iso === today ? ' today' : '');
    col.style.gridRow = `1 / ${totalRows + 1}`;
    col.style.gridColumn = `${i + 2}`;
    col.dataset.date = iso;

    // Half-hour tick marks
    for (let hr = minHour; hr < maxHour; hr++) {
      const tick = document.createElement('div');
      tick.className = 'half-tick';
      tick.style.top = ((hr - minHour) * pxPerHour + pxPerRow) + 'px';
      col.appendChild(tick);
    }

    // Events for this day, resolving overlap layout
    const dayEvents = weekEvents
      .filter(e => e.Date === iso)
      .slice()
      .sort((a, b) => timeToMinutes(a.Start) - timeToMinutes(b.Start));
    const positioned = layoutOverlaps(dayEvents);

    positioned.forEach(({ev, col: colIdx, colCount}) => {
      const startMin = timeToMinutes(ev.Start);
      const endMin = timeToMinutes(ev.End);
      const top = ((startMin - minHour * 60) / 60) * pxPerHour;
      const height = ((endMin - startMin) / 60) * pxPerHour - 2;
      const widthPct = 100 / colCount;
      const leftPct = colIdx * widthPct;

      const block = document.createElement('div');
      block.className = 'week-event';
      block.setAttribute('data-color', getColor(ev.Class));
      block.style.top = top + 'px';
      block.style.height = Math.max(18, height) + 'px';
      block.style.left = `calc(${leftPct}% + 2px)`;
      block.style.width = `calc(${widthPct}% - 4px)`;
      block.style.right = 'auto';

      const parts = [];
      parts.push(`<div class="event-room">${escapeHtml(ev.Room)}</div>`);
      parts.push(`<div class="event-name">${escapeHtml(ev.Class)}</div>`);
      if (height >= 28) parts.push(`<div class="event-time">${escapeHtml(ev.Start)}</div>`);
      block.innerHTML = parts.join('');
      block.addEventListener('click', () => showModal(ev));
      col.appendChild(block);
    });

    grid.appendChild(col);
  });

  container.appendChild(grid);
  container.style.minWidth = '900px';
  container.style.height = (colHeight + 1) + 'px';
}

// Assign overlap columns via a simple sweep.
function layoutOverlaps(sortedEvents) {
  const out = [];
  // Group into clusters that transitively overlap.
  let cluster = [];
  let clusterEnd = -1;
  const flush = () => {
    if (!cluster.length) return;
    // Assign columns greedily.
    const cols = []; // array of last-end-minute per column
    const assignments = [];
    cluster.forEach(ev => {
      const s = timeToMinutes(ev.Start);
      let placed = -1;
      for (let i = 0; i < cols.length; i++) {
        if (cols[i] <= s) { cols[i] = timeToMinutes(ev.End); placed = i; break; }
      }
      if (placed === -1) {
        cols.push(timeToMinutes(ev.End));
        placed = cols.length - 1;
      }
      assignments.push(placed);
    });
    const colCount = cols.length;
    cluster.forEach((ev, idx) => {
      out.push({ ev, col: assignments[idx], colCount });
    });
    cluster = [];
    clusterEnd = -1;
  };
  sortedEvents.forEach(ev => {
    const s = timeToMinutes(ev.Start);
    const e = timeToMinutes(ev.End);
    if (cluster.length && s >= clusterEnd) flush();
    cluster.push(ev);
    clusterEnd = Math.max(clusterEnd, e);
  });
  flush();
  return out;
}

// ---------- Day view ----------
function renderDayView() {
  const container = document.getElementById('day-grid');
  const headerContainer = document.getElementById('day-header');
  const visLocs = locations.filter(l => visibleLocations.has(l));
  document.getElementById('range-label').textContent = formatLongDay(currentDate);

  if (visLocs.length === 0) {
    container.innerHTML = '<p style="color: var(--text-muted); padding: 40px;">No locations visible. Enable a location in the sidebar.</p>';
    headerContainer.innerHTML = '';
    return;
  }

  const dayEvents = events.filter(e => e.Date === currentDate);

  let minHour = 6, maxHour = 22;
  dayEvents.forEach(e => {
    const startH = Math.floor(timeToMinutes(e.Start) / 60);
    const endH = Math.ceil(timeToMinutes(e.End) / 60);
    if (startH < minHour) minHour = startH;
    if (endH > maxHour) maxHour = endH;
  });

  const totalSlots = (maxHour - minHour) * 2;

  // Header row
  headerContainer.innerHTML = '';
  const headerGrid = document.createElement('div');
  headerGrid.style.display = 'grid';
  headerGrid.style.gridTemplateColumns = `60px repeat(${visLocs.length}, 1fr)`;
  headerGrid.style.minWidth = '600px';
  const cornerHeader = document.createElement('div');
  cornerHeader.className = 'col-header';
  cornerHeader.textContent = 'Time';
  headerGrid.appendChild(cornerHeader);
  visLocs.forEach(loc => {
    const h = document.createElement('div');
    h.className = 'col-header';
    h.textContent = loc;
    headerGrid.appendChild(h);
  });
  headerContainer.appendChild(headerGrid);

  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'day-grid';
  grid.style.gridTemplateColumns = `60px repeat(${visLocs.length}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${totalSlots}, 1fr)`;

  const occupiedSlots = {};
  visLocs.forEach(l => occupiedSlots[l] = new Set());
  dayEvents.forEach(ev => {
    if (!visibleLocations.has(ev.Room)) return;
    const startMin = timeToMinutes(ev.Start);
    const endMin = timeToMinutes(ev.End);
    const startSlot = Math.floor((startMin - minHour * 60) / 30);
    const endSlot = Math.ceil((endMin - minHour * 60) / 30);
    for (let s = startSlot; s < endSlot; s++) {
      if (occupiedSlots[ev.Room]) occupiedSlots[ev.Room].add(s);
    }
  });

  for (let slot = 0; slot < totalSlots; slot++) {
    const totalMin = minHour * 60 + slot * 30;
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (m === 0) {
      const timeCell = document.createElement('div');
      timeCell.className = 'time-label';
      timeCell.textContent = `${String(h).padStart(2,'0')}:00`;
      timeCell.style.gridRow = `${slot + 1} / ${slot + 3}`;
      timeCell.style.gridColumn = '1';
      grid.appendChild(timeCell);
    }
    visLocs.forEach((loc, locIdx) => {
      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.style.gridRow = `${slot + 1}`;
      cell.style.gridColumn = `${locIdx + 2}`;
      if (highlightFree && !occupiedSlots[loc].has(slot)) cell.classList.add('free-highlight');
      grid.appendChild(cell);
    });
  }

  dayEvents.forEach(ev => {
    if (!visibleLocations.has(ev.Room)) return;
    const locIdx = visLocs.indexOf(ev.Room);
    if (locIdx === -1) return;
    const startMin = timeToMinutes(ev.Start);
    const endMin = timeToMinutes(ev.End);
    const startSlot = (startMin - minHour * 60) / 30;
    const endSlot = (endMin - minHour * 60) / 30;
    const spanSlots = endSlot - startSlot;

    const block = document.createElement('div');
    block.className = 'event-block';
    block.setAttribute('data-color', getColor(ev.Class));
    block.style.gridRow = `${Math.floor(startSlot) + 1} / ${Math.ceil(endSlot) + 1}`;
    block.style.gridColumn = `${locIdx + 2}`;
    block.style.position = 'relative';
    block.style.margin = '1px 2px';
    block.style.minHeight = '0';

    const nameDiv = document.createElement('div');
    nameDiv.className = 'event-name';
    nameDiv.textContent = ev.Class;
    block.appendChild(nameDiv);

    if (spanSlots >= 1.5) {
      const timeDiv = document.createElement('div');
      timeDiv.className = 'event-time';
      timeDiv.textContent = `${ev.Start} – ${ev.End}`;
      block.appendChild(timeDiv);
    }
    if (spanSlots >= 2.5 && ev.Instructor) {
      const instrDiv = document.createElement('div');
      instrDiv.className = 'event-instructor';
      instrDiv.textContent = ev.Instructor;
      block.appendChild(instrDiv);
    }

    block.addEventListener('click', () => showModal(ev));
    grid.appendChild(block);
  });

  container.appendChild(grid);

  // Compound-search proposals: absolutely-positioned overlay with pixel-accurate
  // placement (independent of the 30-min grid snapping) + color-coded per match.
  if (compoundSearchActive && compoundSearchResults.has(currentDate)) {
    const matches = compoundSearchResults.get(currentDate);
    const overlay = document.createElement('div');
    overlay.className = 'proposals-overlay';
    grid.appendChild(overlay);

    requestAnimationFrame(() => {
      const gridW = grid.offsetWidth;
      const gridH = grid.offsetHeight;
      const timeColW = 60;
      const colW = (gridW - timeColW) / visLocs.length;
      const totalMinutes = (maxHour - minHour) * 60;
      const pxPerMin = gridH / totalMinutes;

      // Pass 1: collect flat list of proposal items
      const items = [];
      matches.forEach((placements, matchIdx) => {
        const color = PROPOSAL_COLORS[matchIdx % PROPOSAL_COLORS.length];
        placements.forEach(p => {
          const locIdx = visLocs.indexOf(p.room);
          if (locIdx === -1) return;
          items.push({ matchIdx, color, locIdx, room: p.room, start: p.start, end: p.end });
        });
      });

      // Pass 2: within each room, cluster transitively-overlapping items and
      // assign each a sub-column + sub-column count so they sit side-by-side
      // instead of stacking on top of each other.
      const byRoom = new Map();
      items.forEach(it => {
        const arr = byRoom.get(it.room) || [];
        arr.push(it);
        byRoom.set(it.room, arr);
      });
      byRoom.forEach(arr => {
        arr.sort((a, b) => a.start - b.start);
        let cluster = [];
        let clusterEnd = -1;
        const flush = () => {
          if (!cluster.length) return;
          const subColEnds = [];
          cluster.forEach(item => {
            let placed = -1;
            for (let i = 0; i < subColEnds.length; i++) {
              if (subColEnds[i] <= item.start) { subColEnds[i] = item.end; placed = i; break; }
            }
            if (placed === -1) { subColEnds.push(item.end); placed = subColEnds.length - 1; }
            item.subCol = placed;
          });
          const subColCount = subColEnds.length;
          cluster.forEach(item => { item.subColCount = subColCount; });
          cluster = [];
          clusterEnd = -1;
        };
        arr.forEach(item => {
          if (cluster.length && item.start >= clusterEnd) flush();
          cluster.push(item);
          clusterEnd = Math.max(clusterEnd, item.end);
        });
        flush();
      });

      // Pass 3: render DOM blocks per match, tracking match groups for the connector SVG
      const groupMap = new Map();
      items.forEach(it => {
        const subW = colW / it.subColCount;
        const top = (it.start - minHour * 60) * pxPerMin;
        const height = (it.end - it.start) * pxPerMin;
        const left = timeColW + it.locIdx * colW + it.subCol * subW + 2;
        const width = subW - 4;
        const b = document.createElement('div');
        b.className = 'proposal-block' + (it.subColCount > 1 ? ' narrow' : '');
        b.style.cssText = `top:${top}px;height:${height}px;left:${left}px;width:${width}px;--prop-color:${it.color};`;
        const showTime = (it.end - it.start) >= (it.subColCount > 1 ? 45 : 30);
        const timeHTML = showTime
          ? `<div class="proposal-time"><span>${minutesToTime(it.start)}</span><span class="t-sep">–</span><span>${minutesToTime(it.end)}</span></div>`
          : '';
        b.innerHTML = `<span class="match-num">${it.matchIdx + 1}</span>${timeHTML}`;
        b.title = `Proposal ${it.matchIdx + 1} · ${it.room} · ${minutesToTime(it.start)}–${minutesToTime(it.end)}`;
        overlay.appendChild(b);
        const g = groupMap.get(it.matchIdx) || { els: [], color: it.color };
        g.els.push(b);
        groupMap.set(it.matchIdx, g);
      });
      const groups = Array.from(groupMap.values());

      // Dotted connector lines between steps of the same match
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'proposal-svg');
      svg.setAttribute('viewBox', `0 0 ${gridW} ${gridH}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      groups.forEach(({ els, color }) => {
        for (let i = 0; i < els.length - 1; i++) {
          const a = els[i];
          const c = els[i + 1];
          const ax = a.offsetLeft, ay = a.offsetTop, aw = a.offsetWidth, ah = a.offsetHeight;
          const cx = c.offsetLeft, cy = c.offsetTop, cw = c.offsetWidth, ch = c.offsetHeight;
          const sameCol = Math.abs(ax - cx) < 4;
          let x1, y1, x2, y2;
          if (sameCol) {
            x1 = ax + aw / 2; y1 = ay + ah;
            x2 = cx + cw / 2; y2 = cy;
          } else {
            const aIsLeft = ax < cx;
            x1 = aIsLeft ? ax + aw : ax;
            y1 = ay + ah / 2;
            x2 = aIsLeft ? cx : cx + cw;
            y2 = cy + ch / 2;
          }
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const midX = (x1 + x2) / 2;
          path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
          path.setAttribute('class', 'proposal-line');
          path.setAttribute('stroke', color);
          svg.appendChild(path);
        }
      });
      overlay.appendChild(svg);
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ==================== Compound slot search ====================

const PROPOSAL_COLORS = ['#c4a35a', '#5cbfbf', '#bf5c7c', '#5cbf7c', '#bf7c5c', '#9a5cbf'];

function minutesToTime(m) {
  return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
}

// Return array of free intervals across the given rooms on the given date,
// within timeRange, with the given between-event buffer applied.
// `warm` = true if an event ended within 30 min before this interval starts.
function getExactFreeIntervals(date, rooms, timeRange, buffer) {
  const results = [];
  rooms.forEach(room => {
    const roomEvents = events
      .filter(e => e.Date === date && e.Room === room)
      .map(e => ({ start: timeToMinutes(e.Start), end: timeToMinutes(e.End) }))
      .sort((a, b) => a.start - b.start);

    let cursor = timeRange.start;
    roomEvents.forEach(ev => {
      const freeEnd = ev.start - buffer;
      if (freeEnd > cursor) {
        const warm = roomEvents.some(prev => prev.end <= cursor && cursor - prev.end <= 30);
        results.push({ room, start: cursor, end: freeEnd, warm });
      }
      cursor = Math.max(cursor, ev.end + buffer);
    });
    if (timeRange.end > cursor) {
      const warm = roomEvents.some(prev => prev.end <= cursor && cursor - prev.end <= 30);
      results.push({ room, start: cursor, end: timeRange.end, warm });
    }
  });
  return results;
}

function getEffectiveDuration(step, interval) {
  if (step.warmup > 0 && !interval.warm) return step.duration + step.warmup;
  return step.duration;
}

// Generalized N-step sequential placement finder. For each step, every candidate
// interval is considered; the recursion enforces that each subsequent placement
// starts no later than `prevEnd + maxTransition`.
function findSequentialPlacements(freeByStep, steps, maxTransition) {
  const matches = [];
  function walk(stepIdx, prevEnd, path) {
    const intervals = freeByStep[stepIdx];
    const step = steps[stepIdx];
    intervals.forEach(iv => {
      const dur = getEffectiveDuration(step, iv);
      if (iv.end - iv.start < dur) return;
      const earliest = stepIdx === 0 ? iv.start : Math.max(iv.start, prevEnd);
      if (stepIdx > 0 && earliest > prevEnd + maxTransition) return;
      if (earliest + dur > iv.end) return;
      const placement = { room: iv.room, start: earliest, end: earliest + dur };
      const nextPath = path.concat([placement]);
      if (stepIdx === steps.length - 1) matches.push(nextPath);
      else walk(stepIdx + 1, placement.end, nextPath);
    });
  }
  walk(0, 0, []);
  return matches;
}

function findCompoundSlots(config) {
  compoundSearchResults = new Map();
  const today = todayIso();
  const allDates = Array.from(new Set(events.map(e => e.Date))).sort();
  allDates.forEach(date => {
    if (date < today) return; // today-forward only
    const d = parseIso(date);
    const dayName = d.toLocaleDateString('en-US', { weekday: 'long' });
    if (!config.dayFilter.has(dayName)) return;

    const freeByStep = config.steps.map(step =>
      getExactFreeIntervals(date, step.rooms, config.timeRange, config.roomBuffer)
    );

    let matches = findSequentialPlacements(freeByStep, config.steps, config.maxTransition);

    if (config.allowReverse && config.steps.length >= 2) {
      const reversedSteps = config.steps.slice().reverse();
      const reversedFree = freeByStep.slice().reverse();
      const reverseMatches = findSequentialPlacements(reversedFree, reversedSteps, config.maxTransition);
      reverseMatches.forEach(m => matches.push(m.slice().reverse()));
    }

    if (matches.length > 0) {
      const seen = new Set();
      const deduped = matches.filter(m => {
        const key = m.map(p => `${p.room}:${p.start}-${p.end}`).join('|');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      compoundSearchResults.set(date, deduped);
    }
  });
  compoundSearchActive = true;
}

// ---------- Search config persistence ----------
const SEARCH_STORAGE_KEY = 'rort-compound-search';

function readSearchConfig() {
  const panel = document.getElementById('find-panel');
  const steps = [];
  panel.querySelectorAll('.search-step').forEach(el => {
    const rooms = [];
    el.querySelectorAll('.room-tag').forEach(tag => rooms.push(tag.dataset.room));
    const duration = parseInt(el.querySelector('.step-duration').value) || 60;
    const warmup = parseInt(el.querySelector('.step-warmup')?.value) || 0;
    if (rooms.length > 0) steps.push({ rooms, duration, warmup });
  });

  const startH = parseInt(panel.querySelector('#search-start').value);
  const endH = parseInt(panel.querySelector('#search-end').value);
  const dayFilter = new Set();
  panel.querySelectorAll('.day-check input:checked').forEach(cb => dayFilter.add(cb.value));
  const roomBuffer = parseInt(panel.querySelector('#search-buffer').value) || 15;
  const maxTransition = parseInt(panel.querySelector('#search-transition').value) || 15;
  const allowReverse = panel.querySelector('#search-reverse').checked;

  return { steps, timeRange: { start: startH * 60, end: endH * 60 }, dayFilter, roomBuffer, maxTransition, allowReverse };
}

function saveSearchConfig(c) {
  try {
    localStorage.setItem(SEARCH_STORAGE_KEY, JSON.stringify({
      steps: c.steps, timeRange: c.timeRange, dayFilter: Array.from(c.dayFilter),
      roomBuffer: c.roomBuffer, maxTransition: c.maxTransition, allowReverse: c.allowReverse,
    }));
  } catch (e) { /* quota / private mode — silent */ }
}

function loadSearchConfig() {
  try {
    const raw = localStorage.getItem(SEARCH_STORAGE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    c.dayFilter = new Set(c.dayFilter);
    return c;
  } catch (e) { return null; }
}

// ---------- Find-view UI ----------
function buildStepHTML(idx, step) {
  const roomTags = step.rooms.map(r =>
    `<span class="room-tag" data-room="${escapeHtml(r)}">${escapeHtml(r)}<span class="room-tag-x">×</span></span>`
  ).join('');
  const options = '<option value="">+ room</option>' +
    Array.from(visibleLocations).map(loc => `<option value="${escapeHtml(loc)}">${escapeHtml(loc)}</option>`).join('');
  return `<div class="search-step" data-step="${idx}">
    <span class="step-label">STEP ${idx + 1}</span>
    <div class="room-tags">${roomTags}</div>
    <select class="room-select">${options}</select>
    <span>for</span>
    <input type="number" class="step-duration" value="${step.duration}" min="15" max="480" step="15"><span>min</span>
    <span>· warm</span>
    <input type="number" class="step-warmup" value="${step.warmup || 0}" min="0" max="120" step="15"><span>min</span>
    ${idx > 0 ? '<button class="remove-step" title="Remove step">×</button>' : ''}
  </div>`;
}

function wireStepEvents(stepEl) {
  const select = stepEl.querySelector('.room-select');
  const tagsContainer = stepEl.querySelector('.room-tags');
  select.addEventListener('change', () => {
    const val = select.value;
    select.value = '';
    if (!val) return;
    if (stepEl.querySelector(`.room-tag[data-room="${CSS.escape(val)}"]`)) return;
    const tag = document.createElement('span');
    tag.className = 'room-tag';
    tag.dataset.room = val;
    tag.innerHTML = `${escapeHtml(val)}<span class="room-tag-x">×</span>`;
    tag.querySelector('.room-tag-x').addEventListener('click', () => tag.remove());
    tagsContainer.appendChild(tag);
  });
  stepEl.querySelectorAll('.room-tag .room-tag-x').forEach(x => {
    x.addEventListener('click', () => x.parentElement.remove());
  });
  const rm = stepEl.querySelector('.remove-step');
  if (rm) {
    rm.addEventListener('click', () => {
      const prev = stepEl.previousElementSibling;
      if (prev && prev.classList.contains('step-sep')) prev.remove();
      stepEl.remove();
    });
  }
}

function initializeFindView() {
  const container = document.getElementById('find-container');
  const saved = loadSearchConfig();
  const defaultSteps = (saved && saved.steps.length) ? saved.steps : [
    { rooms: [], duration: 90, warmup: 15 },
    { rooms: [], duration: 60, warmup: 0 },
  ];
  const defaultStart = saved ? Math.floor(saved.timeRange.start / 60) : 16;
  const defaultEnd = saved ? Math.ceil(saved.timeRange.end / 60) : 22;
  const defaultBuffer = saved ? saved.roomBuffer : 15;
  const defaultTransition = saved ? saved.maxTransition : 15;
  const defaultReverse = saved ? saved.allowReverse : false;
  const defaultDays = saved ? saved.dayFilter : new Set(['Monday','Tuesday','Wednesday','Thursday','Friday']);

  const stepsHTML = defaultSteps.map((s, i) =>
    (i > 0 ? '<span class="step-sep">then →</span>' : '') + buildStepHTML(i, s)
  ).join('');

  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayAbbrev = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const dowHTML = dayNames.map((d, i) => {
    const on = defaultDays.has(d) ? ' checked' : '';
    return `<label class="day-check"><input type="checkbox" value="${d}"${on}><span>${dayAbbrev[i]}</span></label>`;
  }).join('');

  const startOpts = Array.from({length: 24}, (_, h) =>
    `<option value="${h}"${h === defaultStart ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`
  ).join('');
  const endOpts = Array.from({length: 24}, (_, i) => {
    const h = i + 1;
    return `<option value="${h}"${h === defaultEnd ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`;
  }).join('');

  container.innerHTML = `
    <div id="find-panel" class="find-panel">
      <div class="steps-row" id="search-steps">${stepsHTML}<button class="add-step" id="add-step-btn">+ step</button></div>
      <div class="filter-row">
        <span class="fl">Time</span>
        <select id="search-start">${startOpts}</select>
        <span>–</span>
        <select id="search-end">${endOpts}</select>
        <span class="divider"></span>
        <div class="day-checks">${dowHTML}</div>
        <span class="divider"></span>
        <span class="fl">Buffer</span>
        <input type="number" id="search-buffer" value="${defaultBuffer}" min="0" max="60"><span>m</span>
        <span class="fl">Max gap</span>
        <input type="number" id="search-transition" value="${defaultTransition}" min="0" max="120"><span>m</span>
        <label class="reverse-check"><input type="checkbox" id="search-reverse"${defaultReverse ? ' checked' : ''}>Allow reverse</label>
        <span class="spacer"></span>
        <button class="search-btn" id="search-btn">Search</button>
        <span class="clear-link" id="search-clear-btn">Clear</span>
      </div>
    </div>
    <div class="list-scope">
      <span style="color:var(--text-muted);font-size:12px;">Show:</span>
      <div class="scope-tabs" id="scope-tabs">
        <span data-scope="week"${searchScope === 'week' ? ' class="on"' : ''}>This week</span>
        <span data-scope="2weeks"${searchScope === '2weeks' ? ' class="on"' : ''}>Next 2 weeks</span>
        <span data-scope="all"${searchScope === 'all' ? ' class="on"' : ''}>All</span>
      </div>
      <span class="count" id="search-count"></span>
    </div>
    <div class="results-list" id="find-results"></div>
  `;

  container.querySelectorAll('.search-step').forEach(wireStepEvents);

  document.getElementById('add-step-btn').addEventListener('click', () => {
    const stepsContainer = document.getElementById('search-steps');
    const addBtn = document.getElementById('add-step-btn');
    const idx = stepsContainer.querySelectorAll('.search-step').length;
    const sep = document.createElement('span');
    sep.className = 'step-sep';
    sep.textContent = 'then →';
    stepsContainer.insertBefore(sep, addBtn);
    const wrap = document.createElement('div');
    wrap.innerHTML = buildStepHTML(idx, { rooms: [], duration: 60, warmup: 0 });
    const stepEl = wrap.firstElementChild;
    stepsContainer.insertBefore(stepEl, addBtn);
    wireStepEvents(stepEl);
  });

  document.getElementById('search-btn').addEventListener('click', () => {
    const cfg = readSearchConfig();
    if (cfg.steps.length === 0) return;
    saveSearchConfig(cfg);
    findCompoundSlots(cfg);
    renderResultsList();
  });

  document.getElementById('search-clear-btn').addEventListener('click', () => {
    compoundSearchActive = false;
    compoundSearchResults = new Map();
    renderResultsList();
  });

  container.querySelectorAll('#scope-tabs span').forEach(span => {
    span.addEventListener('click', () => {
      searchScope = span.dataset.scope;
      container.querySelectorAll('#scope-tabs span').forEach(s =>
        s.classList.toggle('on', s.dataset.scope === searchScope));
      renderResultsList();
    });
  });
}

function renderResultsList() {
  const root = document.getElementById('find-results');
  const countEl = document.getElementById('search-count');
  if (!compoundSearchActive) {
    root.innerHTML = '<div class="results-empty">Configure your search and click Search.</div>';
    countEl.textContent = '';
    return;
  }

  const today = todayIso();
  let endCutoff;
  if (searchScope === 'week') {
    const d = parseIso(today);
    const dow = (d.getDay() + 6) % 7; // Mon=0
    endCutoff = addDays(today, 6 - dow);
  } else if (searchScope === '2weeks') {
    endCutoff = addDays(today, 13);
  } else {
    endCutoff = '9999-12-31';
  }

  const sortedDates = Array.from(compoundSearchResults.keys())
    .filter(d => d >= today && d <= endCutoff)
    .sort();

  let totalMatches = 0;
  sortedDates.forEach(d => { totalMatches += compoundSearchResults.get(d).length; });
  countEl.textContent = totalMatches > 0 ? `★ ${totalMatches} match${totalMatches === 1 ? '' : 'es'}` : '';

  if (sortedDates.length === 0) {
    root.innerHTML = '<div class="results-empty">No matches in the selected range. Try a wider scope or adjust filters.</div>';
    return;
  }

  root.innerHTML = sortedDates.map(date => {
    const matches = compoundSearchResults.get(date);
    const d = parseIso(date);
    const dow = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    const dt = d.getDate();
    const mon = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
    const isToday = date === today;
    const todayBadge = isToday ? '<span class="today-badge">TODAY</span>' : '';
    const rows = matches.map(m => {
      const first = m[0];
      const last = m[m.length - 1];
      const timeLabel = `${minutesToTime(first.start)} → ${minutesToTime(last.end)}`;
      const flow = m.map(p => `<span class="room-pill">${escapeHtml(p.room)}</span>`)
        .join('<span class="sep">→</span>');
      const durs = m.map(p => `${p.end - p.start}m`).join(' + ');
      return `<div class="match-row" data-date="${date}"><span class="arrow">→</span><span class="time">${timeLabel}</span><span class="flow">${flow}</span><span class="dur">${durs}</span><span class="goto">›</span></div>`;
    }).join('');
    return `<div class="day-group${isToday ? ' today' : ''}">
      <div class="day-head"><span class="dow">${dow}</span><span class="dt">${dt} ${mon}</span>${todayBadge}<span class="count-badge">${matches.length} ${matches.length === 1 ? 'option' : 'options'}</span></div>
      ${rows}
    </div>`;
  }).join('');

  root.querySelectorAll('.match-row').forEach(row => {
    row.addEventListener('click', () => {
      currentDate = row.dataset.date;
      sidebarMonth = firstOfMonth(currentDate);
      viewMode = 'day';
      render();
    });
  });
}

function renderFindView() {
  if (!findViewInitialized) {
    initializeFindView();
    findViewInitialized = true;
  }
  renderResultsList();
}

// ---------- Dev tests (?test=1) ----------
function runTests() {
  const origEvents = events;
  let passed = 0, failed = 0;
  const assert = (name, cond) => {
    if (cond) { passed++; console.log('✓', name); }
    else { failed++; console.error('✗', name); }
  };

  // getExactFreeIntervals
  events = [];
  let free = getExactFreeIntervals('2099-01-01', ['Studio 1'], { start: 960, end: 1320 }, 15);
  assert('Empty day → single full interval',
    free.length === 1 && free[0].start === 960 && free[0].end === 1320);

  events = [{ Date: '2099-01-01', Room: 'Studio 1', Start: '17:00', End: '18:00' }];
  free = getExactFreeIntervals('2099-01-01', ['Studio 1'], { start: 960, end: 1320 }, 15);
  assert('Event mid-range → 2 intervals',
    free.length === 2 && free[0].end === 1020 - 15 && free[1].start === 1080 + 15);

  events = [{ Date: '2099-01-01', Room: 'Studio 1', Start: '15:40', End: '15:55' }];
  free = getExactFreeIntervals('2099-01-01', ['Studio 1'], { start: 960, end: 1320 }, 15);
  assert('Warm flag when prev event ended within 30 min of cursor',
    free.length >= 1 && free[0].warm === true);

  // getEffectiveDuration
  const step = { rooms: ['A'], duration: 60, warmup: 15 };
  assert('Warmup adds to cold interval', getEffectiveDuration(step, { warm: false }) === 75);
  assert('Warmup ignored on warm interval', getEffectiveDuration(step, { warm: true }) === 60);

  // findSequentialPlacements
  let steps = [{ rooms: ['A'], duration: 60, warmup: 0 }];
  let fbs = [[{ room: 'A', start: 0, end: 120, warm: false }]];
  let matches = findSequentialPlacements(fbs, steps, 15);
  assert('1-step: 1 match', matches.length === 1 && matches[0][0].end === 60);

  steps = [
    { rooms: ['A'], duration: 60, warmup: 0 },
    { rooms: ['B'], duration: 30, warmup: 0 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 90, warm: false }],
    [{ room: 'B', start: 60, end: 120, warm: false }],
  ];
  matches = findSequentialPlacements(fbs, steps, 15);
  assert('2-step: 1 match back-to-back',
    matches.length === 1 && matches[0][1].start === 60);

  // CRITICAL: 3-step regression test for copy bug
  steps = [
    { rooms: ['A'], duration: 30, warmup: 0 },
    { rooms: ['B'], duration: 30, warmup: 0 },
    { rooms: ['C'], duration: 30, warmup: 0 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 30, warm: false }],
    [{ room: 'B', start: 30, end: 60, warm: false }],
    [{ room: 'C', start: 60, end: 90, warm: false }],
  ];
  matches = findSequentialPlacements(fbs, steps, 15);
  assert('3-step: works with N=3 (regression)',
    matches.length === 1 && matches[0].length === 3 && matches[0][2].end === 90);

  // Max-transition boundary
  steps = [
    { rooms: ['A'], duration: 30, warmup: 0 },
    { rooms: ['B'], duration: 30, warmup: 0 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 30, warm: false }],
    [{ room: 'B', start: 50, end: 100, warm: false }],
  ];
  matches = findSequentialPlacements(fbs, steps, 15);
  assert('max-transition 15: gap of 20 min does NOT match', matches.length === 0);
  matches = findSequentialPlacements(fbs, steps, 30);
  assert('max-transition 30: gap of 20 min DOES match', matches.length === 1);

  events = origEvents;
  console.log(`\nTests: ${passed} passed, ${failed} failed`);
  if (failed === 0) console.log('ALL TESTS PASSED ✓');
}

// ---------- Event wiring ----------
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('show');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modal-overlay').classList.remove('show');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('show');
  if (e.key === 'ArrowLeft') document.getElementById('prev-range').click();
  if (e.key === 'ArrowRight') document.getElementById('next-range').click();
});

// Sidebar month nav
document.getElementById('prev-month').addEventListener('click', () => {
  sidebarMonth = addMonths(sidebarMonth, -1);
  renderMiniCal();
});
document.getElementById('next-month').addEventListener('click', () => {
  sidebarMonth = addMonths(sidebarMonth, 1);
  renderMiniCal();
});

// Range navigation
document.getElementById('prev-range').addEventListener('click', () => {
  if (viewMode === 'find') return;
  currentDate = addDays(currentDate, viewMode === 'week' ? -7 : -1);
  sidebarMonth = firstOfMonth(currentDate);
  render();
});
document.getElementById('next-range').addEventListener('click', () => {
  if (viewMode === 'find') return;
  currentDate = addDays(currentDate, viewMode === 'week' ? 7 : 1);
  sidebarMonth = firstOfMonth(currentDate);
  render();
});
document.getElementById('today-btn').addEventListener('click', () => {
  currentDate = todayIso();
  sidebarMonth = firstOfMonth(currentDate);
  render();
});

// View mode toggle
document.querySelectorAll('.view-mode button').forEach(btn => {
  btn.addEventListener('click', () => {
    viewMode = btn.dataset.mode;
    render();
  });
});

// Free-slots toggle (day view only)
document.getElementById('free-toggle').addEventListener('click', () => {
  highlightFree = !highlightFree;
  document.getElementById('highlight-free').checked = highlightFree;
  document.getElementById('free-toggle').classList.toggle('active', highlightFree);
  render();
});

// CSV upload
document.getElementById('csv-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => addEvents(parseCSV(ev.target.result));
  reader.readAsText(file);
  e.target.value = '';
});

// ---------- Init ----------
if (location.search.includes('test=1')) runTests();
render();
loadInitialData();
</script>
