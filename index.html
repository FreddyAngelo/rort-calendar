<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rört Calendar</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #c4a35a;
    --event-bg: #2a1f3d;
    --event-border: #4a3a6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--accent);
  }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  .last-updated {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: inline-block;
  }
  .btn:hover { border-color: var(--accent); }

  #csv-upload { display: none; }

  /* Main layout: sidebar + main */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .month-nav h2 {
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }
  .month-nav button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    border-radius: 4px;
  }
  .month-nav button:hover { background: var(--bg); color: var(--accent); }

  .mini-cal {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 14px;
  }
  .mini-cal .dow {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0;
    font-weight: 600;
  }
  .mini-cal .day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    padding-top: 3px;
    user-select: none;
  }
  .mini-cal .day:hover { background: var(--bg); }
  .mini-cal .day.empty { visibility: hidden; cursor: default; }
  .mini-cal .day.muted { color: var(--text-muted); opacity: 0.4; }
  .mini-cal .day.in-range { background: rgba(196, 163, 90, 0.08); }
  .mini-cal .day.selected { background: var(--accent); color: #000; font-weight: 700; }
  .mini-cal .day.today { box-shadow: inset 0 0 0 1px var(--accent); }
  .mini-cal .day .dots { display: flex; gap: 2px; margin-top: 1px; height: 3px; }
  .mini-cal .day .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); opacity: 0.7; }
  .mini-cal .day.selected .dot { background: #000; opacity: 1; }

  .sidebar-section {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .loc-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }
  .loc-toggle {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .loc-toggle.active {
    border-color: var(--accent);
    background: rgba(196, 163, 90, 0.1);
  }
  .loc-toggle input { display: none; }
  .loc-toggle .loc-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .loc-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .loc-gear {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px 4px;
    font-size: 13px;
    line-height: 1;
    border-radius: 4px;
    opacity: 0.5;
  }
  .loc-gear:hover { opacity: 1; color: var(--accent); background: var(--bg); }

  /* Sidebar dot swatches: bright accent color for quick scanning */
  .loc-swatch[data-color="0"] { background: #7c5cbf; }
  .loc-swatch[data-color="1"] { background: #5c8abf; }
  .loc-swatch[data-color="2"] { background: #bf7c5c; }
  .loc-swatch[data-color="3"] { background: #5cbf7c; }
  .loc-swatch[data-color="4"] { background: #bf5c7c; }
  .loc-swatch[data-color="5"] { background: #8abf5c; }
  .loc-swatch[data-color="6"] { background: #bfbf5c; }
  .loc-swatch[data-color="7"] { background: #5cbfbf; }
  .loc-swatch[data-color="8"] { background: #9a5cbf; }
  .loc-swatch[data-color="9"] { background: #bf5cbf; }

  /* Location settings popover */
  .popover {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    width: 280px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    z-index: 100;
  }
  .popover.show { display: block; }
  .popover-title {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .popover-palette {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .color-swatch {
    flex: 1;
    height: 24px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: 2px solid transparent;
    outline-offset: 1px;
    transition: transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { outline-color: var(--accent); }
  .popover-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }
  .popover-input::placeholder { color: var(--text-muted); }
  .popover-input:focus { outline: none; border-color: var(--accent); }

  /* Main content */
  .main { display: flex; flex-direction: column; min-height: 0; }

  .main-toolbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .range-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .range-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .range-nav button:hover { border-color: var(--accent); }
  .range-label {
    font-size: 15px;
    font-weight: 600;
    min-width: 220px;
    text-align: center;
    color: var(--text);
  }
  .today-pill {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .view-mode {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-left: auto;
  }
  .view-mode button {
    background: var(--bg);
    border: none;
    color: var(--text-muted);
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
  }
  .view-mode button.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .calendar-container {
    overflow: auto;
    flex: 1;
    min-height: 0;
  }

  /* Day view grid */
  #day-header {
    padding: 0 20px;
    min-width: 600px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
  }
  .day-calendar-wrap { padding: 16px 20px; }
  .day-grid { display: grid; gap: 0; min-width: 600px; position: relative; }
  .col-header {
    background: var(--surface);
    padding: 10px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    color: var(--accent);
  }
  .time-label {
    background: var(--surface);
    padding: 4px 8px;
    font-size: 12px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    text-align: right;
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .hour-cell {
    border: 1px solid var(--border);
    min-height: 28px;
    position: relative;
  }

  .event-block {
    position: absolute;
    left: 2px;
    right: 2px;
    background: var(--event-bg);
    border-left: 3px solid var(--event-border);
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 11px;
    line-height: 1.3;
    overflow: hidden;
    cursor: pointer;
    z-index: 1;
    transition: filter 0.15s;
  }
  .event-block:hover { filter: brightness(1.3); z-index: 3; }
  .event-block .event-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-block .event-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
  .event-block .event-room { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-block .event-instructor { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Week view grid */
  #week-header {
    padding: 0;
    min-width: 900px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
  }
  .week-grid-wrap { padding: 0 0 16px; }
  .week-grid {
    display: grid;
    grid-template-columns: 64px repeat(7, 1fr);
    min-width: 900px;
  }
  .week-day-header {
    background: var(--surface);
    padding: 10px 6px;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .week-day-header:hover .wk-date { color: var(--accent); }
  .week-day-header .wk-dow { font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; font-weight: 600; }
  .week-day-header .wk-date { font-size: 20px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .week-day-header.today { box-shadow: inset 0 -3px 0 var(--accent); }
  .week-day-header.today .wk-date { color: var(--accent); }
  .week-corner {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .week-time-cell {
    background: var(--surface);
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-muted);
    border-right: 1px solid var(--border);
    border-top: 1px solid var(--border);
    text-align: right;
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .week-day-col {
    border-right: 1px solid var(--border);
    position: relative;
  }
  .week-day-col.today { background: rgba(196, 163, 90, 0.03); }
  .week-day-col .hour-tick {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px solid var(--border);
    pointer-events: none;
  }
  .week-day-col .half-tick {
    position: absolute;
    left: 0; right: 0;
    border-top: 1px dashed var(--border);
    opacity: 0.35;
    pointer-events: none;
  }
  .week-event {
    position: absolute;
    left: 2px;
    right: 2px;
    border-radius: 3px;
    padding: 3px 5px;
    font-size: 10px;
    line-height: 1.25;
    overflow: hidden;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .week-event:hover { filter: brightness(1.3); z-index: 5; }

  /* Event color palette — shared between calendar tiles and settings-modal swatches */
  .event-block[data-color="0"], .week-event[data-color="0"], .color-swatch[data-color="0"] { background: #2a1f3d; border-left: 3px solid #7c5cbf; }
  .event-block[data-color="1"], .week-event[data-color="1"], .color-swatch[data-color="1"] { background: #1f2a3d; border-left: 3px solid #5c8abf; }
  .event-block[data-color="2"], .week-event[data-color="2"], .color-swatch[data-color="2"] { background: #3d2a1f; border-left: 3px solid #bf7c5c; }
  .event-block[data-color="3"], .week-event[data-color="3"], .color-swatch[data-color="3"] { background: #1f3d2a; border-left: 3px solid #5cbf7c; }
  .event-block[data-color="4"], .week-event[data-color="4"], .color-swatch[data-color="4"] { background: #3d1f2a; border-left: 3px solid #bf5c7c; }
  .event-block[data-color="5"], .week-event[data-color="5"], .color-swatch[data-color="5"] { background: #2a3d1f; border-left: 3px solid #8abf5c; }
  .event-block[data-color="6"], .week-event[data-color="6"], .color-swatch[data-color="6"] { background: #3d3d1f; border-left: 3px solid #bfbf5c; }
  .event-block[data-color="7"], .week-event[data-color="7"], .color-swatch[data-color="7"] { background: #1f3d3d; border-left: 3px solid #5cbfbf; }
  .event-block[data-color="8"], .week-event[data-color="8"], .color-swatch[data-color="8"] { background: #2d1f3d; border-left: 3px solid #9a5cbf; }
  .event-block[data-color="9"], .week-event[data-color="9"], .color-swatch[data-color="9"] { background: #3d1f3d; border-left: 3px solid #bf5cbf; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 420px;
    width: 90%;
    position: relative;
  }
  .modal h2 { font-size: 18px; color: var(--accent); margin-bottom: 16px; }
  .modal .detail-row {
    display: flex;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .modal .detail-row:last-child { border-bottom: none; }
  .modal .detail-label {
    color: var(--text-muted);
    min-width: 90px;
    font-weight: 500;
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  /* ==================== Day view overlay (events + proposals) ==================== */
  .day-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .day-overlay .event-block,
  .day-overlay .proposal-block {
    pointer-events: auto;
  }
  .proposal-block {
    --prop-color: #c4a35a;
    position: absolute;
    background: color-mix(in srgb, var(--prop-color) 12%, transparent);
    border: 1.5px dashed var(--prop-color);
    border-radius: 3px;
    padding: 4px 5px 3px 25px;
    font-size: 10px;
    color: var(--prop-color);
    opacity: 0.95;
    overflow: hidden;
    line-height: 1.2;
    pointer-events: auto;
    min-width: 0;
  }
  .proposal-block .match-num {
    position: absolute;
    top: 3px;
    left: 3px;
    background: var(--prop-color);
    color: #0f0f0f;
    font-size: 10px;
    font-weight: 700;
    width: 17px;
    height: 17px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .proposal-block .proposal-time {
    font-size: 10px;
    color: var(--prop-color);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Narrow variant: when proposals are side-by-side in the same room,
     stack the start/end timestamps on separate lines below the badge
     (the single-line "18:15–20:45" format won't fit in the narrow sub-column). */
  .proposal-block.narrow {
    padding: 22px 4px 3px 4px;
  }
  .proposal-block.narrow .proposal-time { line-height: 1.15; }
  .proposal-block.narrow .proposal-time > span { display: block; }
  .proposal-block.narrow .proposal-time .t-sep { display: none; }

  /* Two-zone variant: cold-sauna proposals split into a hatched preheat zone
     (top) and a clean usage zone (bottom). */
  .proposal-block.has-heat {
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  .proposal-block.has-heat .heat-zone {
    flex: 0 0 auto;
    background: repeating-linear-gradient(
      135deg,
      rgba(212, 114, 84, 0.18) 0 5px,
      rgba(212, 114, 84, 0.06) 5px 10px
    );
    border-bottom: 1px dashed rgba(212, 114, 84, 0.5);
    color: rgba(229, 144, 122, 0.9);
    padding: 4px 5px 3px 25px;
    font-size: 9px;
    line-height: 1.15;
    display: flex;
    align-items: center;
    gap: 4px;
    overflow: hidden;
    min-width: 0;
  }
  .proposal-block.has-heat .heat-zone .flame { font-size: 10px; }
  .proposal-block.has-heat .use-zone {
    flex: 1 1 auto;
    padding: 4px 5px 3px 5px;
    font-size: 10px;
    color: var(--prop-color);
    line-height: 1.2;
    overflow: hidden;
    min-width: 0;
  }
  .proposal-block.has-heat .use-zone .use-room {
    color: var(--text);
    font-weight: 600;
  }
  .proposal-block.has-heat.narrow {
    padding: 0;
  }
  .proposal-block.has-heat.narrow .heat-zone {
    padding: 22px 3px 3px 3px;
    justify-content: center;
    text-align: center;
  }
  .proposal-block.has-heat.narrow .use-zone {
    padding: 3px 4px;
    font-size: 9px;
  }
  .proposal-block.has-heat.narrow .use-zone .use-time { display: flex; flex-direction: column; line-height: 1.1; }
  .proposal-block.has-heat.narrow .use-zone .use-time .t-sep { display: none; }

  .proposal-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 4;
  }
  .proposal-line {
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
    fill: none;
    opacity: 0.8;
  }

  /* ==================== Find view ==================== */
  .main-toolbar.find-mode .range-nav,
  .main-toolbar.find-mode .range-label { display: none; }

  #find-container {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .find-panel {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .room-tags {
    display: inline-flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .room-tag {
    background: rgba(196, 163, 90, 0.12);
    border: 1px solid rgba(196, 163, 90, 0.35);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .room-tag.sauna {
    background: rgba(212, 114, 84, 0.12);
    border-color: rgba(212, 114, 84, 0.4);
    color: #d47254;
  }
  .room-tag-x {
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    line-height: 1;
  }
  .room-tag-x:hover { color: var(--text); }
  .room-select {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .add-step {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 4px 10px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .add-step:hover { color: var(--accent); border-color: var(--accent); }

  .filter-row {

<body>

<header>
  <h1>RÖRT CALENDAR</h1>

    <a
      class="btn"

      target="_blank"
      rel="noopener"
      title="Opens GitHub Actions. Click &quot;Run workflow&quot;, wait ~30s, then reload this page."
    >Refresh schedule</a>

      </div>

      <div class="view-mode">
        <button id="view-day" data-mode="day">Day</button>

<div class="modal-overlay" id="modal-overlay">

<div class="popover" id="loc-settings-popover">

  <div class="popover-palette" id="loc-settings-palette"></div>
  <input type="text" class="popover-input" id="loc-settings-short" placeholder="Short name (e.g. S1)" maxlength="6" />
</div>

<script>
// ---------- State ----------
let events = [];
let locations = [];
let visibleLocations = new Set();
let locationColors = {};
let colorIndex = 0;

// Per-location user settings: { [Room]: { color: 0-9, shortName: '' } }
const LOC_SETTINGS_KEY = 'rort-calendar-location-settings-v1';
let locationSettings = (() => {
  try { return JSON.parse(localStorage.getItem(LOC_SETTINGS_KEY)) || {}; }
  catch { return {}; }
})();
function saveLocationSettings() {
  try { localStorage.setItem(LOC_SETTINGS_KEY, JSON.stringify(locationSettings)); } catch {}
}
const TIGHT_WIDTH_PX = 80;
// Rainbow visual order for the swatch row. Color indices (0-9) are preserved for saved settings.
const RAINBOW_ORDER = [4, 2, 6, 5, 3, 7, 1, 0, 8, 9];

// Current date cursor (ISO yyyy-mm-dd). Defaults to today.
let currentDate = todayIso();
// View mode: 'day' | 'week' | 'find'
let viewMode = 'week';
// Month currently displayed in the sidebar (1st of month as ISO)
let sidebarMonth = firstOfMonth(currentDate);

// ---------- Compound search state ----------
let searchScope = '2weeks';           // 'week' | '2weeks' | 'all'
let compoundSearchActive = false;
let compoundSearchResults = new Map(); // date -> array of match-paths, each path = [{room,start,end}, ...]
let findViewInitialized = false;

// ---------- Date helpers ----------
function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseIso(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m-1, d);
}
function toIso(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(iso, n) {
  const d = parseIso(iso);
  d.setDate(d.getDate() + n);
  return toIso(d);
}
function mondayOf(iso) {
  const d = parseIso(iso);
  // JS Sunday=0, we want Monday=0
  const dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  return toIso(d);
}
function firstOfMonth(iso) {
  const d = parseIso(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function addMonths(iso, n) {
  const d = parseIso(iso);
  d.setMonth(d.getMonth() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
}
function daysInMonth(iso) {
  const d = parseIso(iso);
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function formatLongDay(iso) {
  return parseIso(iso).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function formatWeekRange(mondayIso) {
  const a = parseIso(mondayIso);
  const b = parseIso(addDays(mondayIso, 6));
  const sameMonth = a.getMonth() === b.getMonth();
  const aLbl = a.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const bLbl = sameMonth
    ? b.toLocaleDateString('en-US', { day: 'numeric' })
    : b.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return `${aLbl} – ${bLbl}, ${b.getFullYear()}`;
}
function formatMonth(iso) {
  return parseIso(iso).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function timeToMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getColor(location) {
  const override = locationSettings[location]?.color;
  if (Number.isInteger(override)) return override;
  if (!(location in locationColors)) {
    locationColors[location] = colorIndex % 10;
    colorIndex++;
  }
  return locationColors[location];
}

function getShortName(location) {
  return locationSettings[location]?.shortName || '';
}

// ---------- Data loading ----------
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  const parsed = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = [];
    let current = '';
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === ',' && !inQuotes) { vals.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    vals.push(current.trim());
    const obj = {};
    headers.forEach((h, idx) => obj[h.trim()] = vals[idx] || '');
    parsed.push(obj);
  }
  return parsed;
}

async function loadInitialData() {
  const files = Array.from({ length: 11 }, (_, i) => `data/rort_schedule_week${i + 1}.csv`);
  let latestModified = null;
  for (const file of files) {
    try {
      const resp = await fetch(file);
      if (resp.ok) {
        const text = await resp.text();
        addEvents(parseCSV(text));
        const lm = resp.headers.get('Last-Modified');
        if (lm) {
          const d = new Date(lm);
          if (!isNaN(d) && (!latestModified || d > latestModified)) latestModified = d;
        }
      }
    } catch (e) { /* skip */ }
  }
  updateLastUpdated(latestModified);
}

function updateLastUpdated(date) {
  const el = document.getElementById('last-updated');
  if (!el) return;
  if (!date) { el.textContent = ''; return; }
  const formatted = date.toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
  el.textContent = `Updated ${formatted}`;
  el.title = `Schedule data last updated ${date.toString()}`;
}

function addEvents(newEvents) {
  events = events.concat(newEvents);
  const locSet = new Set();
  events.forEach(e => locSet.add(e.Room));
  locations = Array.from(locSet).sort();
  if (visibleLocations.size === 0) visibleLocations = new Set(locations);
  else locations.forEach(l => visibleLocations.add(l));

  // Ensure currentDate is within known data; if not, snap to closest known date.
  const dates = events.map(e => e.Date).sort();
  if (dates.length) {
    if (currentDate < dates[0]) currentDate = dates[0];
    if (currentDate > dates[dates.length-1]) currentDate = dates[dates.length-1];
    sidebarMonth = firstOfMonth(currentDate);
  }

  buildLocationControls();
  render();
}

// ---------- Controls ----------
function buildLocationControls() {
  const container = document.getElementById('location-toggles');
  container.innerHTML = '';
  locations.forEach(loc => {
    const row = document.createElement('div');
    row.className = 'loc-toggle' + (visibleLocations.has(loc) ? ' active' : '');

    const swatch = document.createElement('span');
    swatch.className = 'loc-swatch';
    swatch.setAttribute('data-color', getColor(loc));

    const name = document.createElement('span');
    name.className = 'loc-name';
    name.textContent = loc;

    const gear = document.createElement('button');
    gear.className = 'loc-gear';
    gear.innerHTML = '&#9881;';
    gear.title = 'Location settings';

    row.appendChild(swatch);
    row.appendChild(name);
    row.appendChild(gear);

    row.addEventListener('click', (e) => {
      if (e.target === gear || gear.contains(e.target)) return;
      const nowOn = !visibleLocations.has(loc);
      if (nowOn) visibleLocations.add(loc);
      else visibleLocations.delete(loc);
      row.classList.toggle('active', nowOn);
      render();
    });
    gear.addEventListener('click', (e) => {
      e.stopPropagation();
      openLocationSettings(loc, row);
    });

    container.appendChild(row);
  });
}

let closePopoverListener = null;

function openLocationSettings(loc, anchor) {
  const pop = document.getElementById('loc-settings-popover');
  document.getElementById('loc-settings-title').textContent = loc;

  const palette = document.getElementById('loc-settings-palette');
  palette.innerHTML = '';
  const currentColor = getColor(loc);
  RAINBOW_ORDER.forEach(i => {
    const btn = document.createElement('button');
    btn.className = 'color-swatch' + (i === currentColor ? ' selected' : '');
    btn.setAttribute('data-color', i);
    btn.addEventListener('click', () => {
      locationSettings[loc] = { ...locationSettings[loc], color: i };
      saveLocationSettings();
      palette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
      buildLocationControls();
      render();
    });
    palette.appendChild(btn);
  });

  const shortInput = document.getElementById('loc-settings-short');
  shortInput.value = getShortName(loc);
  shortInput.oninput = () => {
    const v = shortInput.value.trim();
    locationSettings[loc] = { ...locationSettings[loc], shortName: v };
    saveLocationSettings();
    render();
  };

  pop.classList.add('show');
  positionPopover(pop, anchor);

  if (closePopoverListener) document.removeEventListener('mousedown', closePopoverListener);
  closePopoverListener = (e) => {
    if (!pop.contains(e.target) && e.target !== anchor && !anchor.contains(e.target)) {
      closeLocationSettings();
    }
  };
  setTimeout(() => document.addEventListener('mousedown', closePopoverListener), 0);
}

function positionPopover(pop, anchor) {
  const rect = anchor.getBoundingClientRect();
  const margin = 8;
  const popWidth = pop.offsetWidth;
  const popHeight = pop.offsetHeight;
  let left = rect.right + margin;
  let top = rect.top;
  if (left + popWidth > window.innerWidth - margin) {
    left = rect.left - popWidth - margin;
  }
  if (left < margin) left = margin;
  if (top + popHeight > window.innerHeight - margin) {
    top = window.innerHeight - popHeight - margin;
  }
  if (top < margin) top = margin;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
}

function closeLocationSettings() {
  document.getElementById('loc-settings-popover').classList.remove('show');
  if (closePopoverListener) {
    document.removeEventListener('mousedown', closePopoverListener);
    closePopoverListener = null;
  }
}

// ---------- Mini calendar ----------
function eventsPerDate() {
  const map = {};
  events.forEach(e => {
    if (!visibleLocations.has(e.Room)) return;
    map[e.Date] = (map[e.Date] || 0) + 1;
  });
  return map;
}
function densityDots(n) {
  if (!n) return 0;
  if (n <= 2) return 1;
  if (n <= 5) return 2;
  return 3;
}

function renderMiniCal() {
  document.getElementById('month-label').textContent = formatMonth(sidebarMonth);
  const container = document.getElementById('mini-cal');
  container.innerHTML = '';

  // DOW headers (Mon-first)
  ['M','T','W','T','F','S','S'].forEach(s => {
    const el = document.createElement('div');
    el.className = 'dow';
    el.textContent = s;
    container.appendChild(el);
  });

  const first = parseIso(sidebarMonth);
  const firstDow = (first.getDay() + 6) % 7; // Mon=0
  const dim = daysInMonth(sidebarMonth);
  const year = first.getFullYear();
  const month = first.getMonth();

  // Leading empty cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    container.appendChild(el);
  }

  const counts = eventsPerDate();
  const weekStart = viewMode === 'week' ? mondayOf(currentDate) : null;
  const weekEnd = weekStart ? addDays(weekStart, 6) : null;

  for (let d = 1; d <= dim; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'day';
    if (iso === todayIso()) cell.classList.add('today');
    if (iso === currentDate) cell.classList.add('selected');
    if (viewMode === 'week' && iso >= weekStart && iso <= weekEnd && iso !== currentDate) {
      cell.classList.add('in-range');
    }
    const hasAny = !!counts[iso];
    if (!hasAny) cell.classList.add('muted');

    const num = document.createTextNode(String(d));
    cell.appendChild(num);

    const dots = document.createElement('div');
    dots.className = 'dots';
    const dotCount = densityDots(counts[iso] || 0);
    for (let i = 0; i < dotCount; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot';
      dots.appendChild(dot);
    }
    cell.appendChild(dots);

    cell.addEventListener('click', () => {
      currentDate = iso;
      sidebarMonth = firstOfMonth(iso);
      render();
    });
    container.appendChild(cell);
  }
}

// ---------- Main render dispatch ----------
function render() {
  renderMiniCal();
  document.getElementById('view-day').classList.toggle('active', viewMode === 'day');
  document.getElementById('view-week').classList.toggle('active', viewMode === 'week');
  document.getElementById('view-find').classList.toggle('active', viewMode === 'find');
  document.getElementById('week-container').style.display = viewMode === 'week' ? '' : 'none';
  document.getElementById('day-container').style.display = viewMode === 'day' ? '' : 'none';
  document.getElementById('find-container').style.display = viewMode === 'find' ? '' : 'none';
  document.querySelector('.main-toolbar').classList.toggle('find-mode', viewMode === 'find');
  if (viewMode === 'week') renderWeekView();
  else if (viewMode === 'day') renderDayView();
  else renderFindView();
  requestAnimationFrame(applyTightNames);
}

function applyTightNames() {
  document.querySelectorAll('.event-room[data-full]').forEach(el => {
    const full = el.dataset.full;
    const short = el.dataset.short;
    if (!short) { el.textContent = full; return; }
    const tileWidth = el.closest('.week-event, .event-block')?.offsetWidth || 0;
    el.textContent = tileWidth > 0 && tileWidth < TIGHT_WIDTH_PX ? short : full;
  });
}

// ---------- Week view ----------
function renderWeekView() {
  const container = document.getElementById('week-grid');
  const header = document.getElementById('week-header');
  const weekStart = mondayOf(currentDate);
  document.getElementById('range-label').textContent = formatWeekRange(weekStart);

  const minHourDefault = 6, maxHourDefault = 22;
  let minHour = minHourDefault, maxHour = maxHourDefault;

  const days = Array.from({length: 7}, (_, i) => addDays(weekStart, i));
  const weekEvents = events.filter(e =>
    days.includes(e.Date) && visibleLocations.has(e.Room)
  );
  weekEvents.forEach(e => {
    const sH = Math.floor(timeToMinutes(e.Start) / 60);
    const eH = Math.ceil(timeToMinutes(e.End) / 60);
    if (sH < minHour) minHour = sH;
    if (eH > maxHour) maxHour = eH;
  });

  const rowsPerHour = 2; // 30-min rows
  const pxPerRow = 28;   // row height
  const pxPerHour = pxPerRow * rowsPerHour;
  const totalRows = (maxHour - minHour) * rowsPerHour;
  const colHeight = totalRows * pxPerRow;

  // Header row
  header.innerHTML = '';
  const headerGrid = document.createElement('div');
  headerGrid.style.display = 'grid';
  headerGrid.style.gridTemplateColumns = `64px repeat(7, 1fr)`;
  headerGrid.style.minWidth = '900px';

  const corner = document.createElement('div');
  corner.className = 'week-corner';
  corner.style.padding = '10px 6px';
  headerGrid.appendChild(corner);

  const today = todayIso();
  days.forEach(iso => {
    const d = parseIso(iso);
    const h = document.createElement('div');
    h.className = 'week-day-header' + (iso === today ? ' today' : '');
    const dow = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    const date = d.getDate();
    h.innerHTML = `<div class="wk-dow">${dow}</div><div class="wk-date">${date}</div>`;
    h.addEventListener('click', () => {
      currentDate = iso;
      viewMode = 'day';
      render();
    });
    headerGrid.appendChild(h);
  });
  header.appendChild(headerGrid);

  // Body grid
  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'week-grid';
  grid.style.gridTemplateRows = `repeat(${totalRows}, ${pxPerRow}px)`;

  // Time labels column (spans 2 rows per hour)
  for (let hr = minHour; hr < maxHour; hr++) {
    const slot = (hr - minHour) * rowsPerHour;
    const t = document.createElement('div');
    t.className = 'week-time-cell';
    t.textContent = `${String(hr).padStart(2,'0')}:00`;
    t.style.gridRow = `${slot + 1} / ${slot + 3}`;
    t.style.gridColumn = '1';
    grid.appendChild(t);
  }

  // Day columns
  days.forEach((iso, i) => {
    const col = document.createElement('div');
    col.className = 'week-day-col' + (iso === today ? ' today' : '');
    col.style.gridRow = `1 / ${totalRows + 1}`;
    col.style.gridColumn = `${i + 2}`;
    col.dataset.date = iso;

    // Hour + half-hour tick marks
    for (let hr = minHour; hr < maxHour; hr++) {
      const hourTick = document.createElement('div');
      hourTick.className = 'hour-tick';
      hourTick.style.top = ((hr - minHour) * pxPerHour) + 'px';
      col.appendChild(hourTick);

      const halfTick = document.createElement('div');
      halfTick.className = 'half-tick';
      halfTick.style.top = ((hr - minHour) * pxPerHour + pxPerRow) + 'px';
      col.appendChild(halfTick);
    }

    // Events for this day, resolving overlap layout
    const dayEvents = weekEvents
      .filter(e => e.Date === iso)
      .slice()
      .sort((a, b) => timeToMinutes(a.Start) - timeToMinutes(b.Start));
    const positioned = layoutOverlaps(dayEvents);

    positioned.forEach(({ev, col: colIdx, colCount}) => {
      const startMin = timeToMinutes(ev.Start);
      const endMin = timeToMinutes(ev.End);
      const top = ((startMin - minHour * 60) / 60) * pxPerHour;
      const height = ((endMin - startMin) / 60) * pxPerHour - 2;
      const widthPct = 100 / colCount;
      const leftPct = colIdx * widthPct;

      const block = document.createElement('div');
      block.className = 'week-event';
      block.setAttribute('data-color', getColor(ev.Room));
      block.style.top = top + 'px';
      block.style.height = Math.max(18, height) + 'px';
      block.style.left = `calc(${leftPct}% + 2px)`;
      block.style.width = `calc(${widthPct}% - 4px)`;
      block.style.right = 'auto';

      const parts = [];
      const shortName = getShortName(ev.Room);
      parts.push(`<div class="event-room" data-full="${escapeHtml(ev.Room)}" data-short="${escapeHtml(shortName)}">${escapeHtml(ev.Room)}</div>`);
      parts.push(`<div class="event-time">${escapeHtml(ev.Start)}</div>`);
      block.innerHTML = parts.join('');
      block.addEventListener('click', () => showModal(ev));
      col.appendChild(block);
    });

    grid.appendChild(col);
  });

  container.appendChild(grid);
  container.style.minWidth = '900px';
  container.style.height = (colHeight + 1) + 'px';
}

// Assign overlap columns via a simple sweep.
function layoutOverlaps(sortedEvents) {
  const out = [];
  // Group into clusters that transitively overlap.
  let cluster = [];
  let clusterEnd = -1;
  const flush = () => {
    if (!cluster.length) return;
    // Assign columns greedily.
    const cols = []; // array of last-end-minute per column
    const assignments = [];
    cluster.forEach(ev => {
      const s = timeToMinutes(ev.Start);
      let placed = -1;
      for (let i = 0; i < cols.length; i++) {
        if (cols[i] <= s) { cols[i] = timeToMinutes(ev.End); placed = i; break; }
      }
      if (placed === -1) {
        cols.push(timeToMinutes(ev.End));
        placed = cols.length - 1;
      }
      assignments.push(placed);
    });
    const colCount = cols.length;
    cluster.forEach((ev, idx) => {
      out.push({ ev, col: assignments[idx], colCount });
    });
    cluster = [];
    clusterEnd = -1;
  };
  sortedEvents.forEach(ev => {
    const s = timeToMinutes(ev.Start);
    const e = timeToMinutes(ev.End);
    if (cluster.length && s >= clusterEnd) flush();
    cluster.push(ev);
    clusterEnd = Math.max(clusterEnd, e);
  });
  flush();
  return out;
}

// ---------- Day view ----------
function renderDayView() {
  const container = document.getElementById('day-grid');
  const headerContainer = document.getElementById('day-header');
  const visLocs = locations.filter(l => visibleLocations.has(l));
  document.getElementById('range-label').textContent = formatLongDay(currentDate);

  if (visLocs.length === 0) {
    container.innerHTML = '<p style="color: var(--text-muted); padding: 40px;">No locations visible. Enable a location in the sidebar.</p>';
    headerContainer.innerHTML = '';
    return;
  }

  const dayEvents = events.filter(e => e.Date === currentDate);

  let minHour = 6, maxHour = 22;
  dayEvents.forEach(e => {
    const startH = Math.floor(timeToMinutes(e.Start) / 60);
    const endH = Math.ceil(timeToMinutes(e.End) / 60);
    if (startH < minHour) minHour = startH;
    if (endH > maxHour) maxHour = endH;
  });

  const totalSlots = (maxHour - minHour) * 2;

  // Header row
  headerContainer.innerHTML = '';
  const headerGrid = document.createElement('div');
  headerGrid.style.display = 'grid';
  headerGrid.style.gridTemplateColumns = `60px repeat(${visLocs.length}, 1fr)`;
  headerGrid.style.minWidth = '600px';
  const cornerHeader = document.createElement('div');
  cornerHeader.className = 'col-header';
  cornerHeader.textContent = 'Time';
  headerGrid.appendChild(cornerHeader);
  visLocs.forEach(loc => {
    const h = document.createElement('div');
    h.className = 'col-header';
    h.textContent = loc;
    headerGrid.appendChild(h);
  });
  headerContainer.appendChild(headerGrid);

  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'day-grid';
  grid.style.gridTemplateColumns = `60px repeat(${visLocs.length}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${totalSlots}, 1fr)`;

  for (let slot = 0; slot < totalSlots; slot++) {
    const totalMin = minHour * 60 + slot * 30;
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (m === 0) {
      const timeCell = document.createElement('div');
      timeCell.className = 'time-label';
      timeCell.textContent = `${String(h).padStart(2,'0')}:00`;
      timeCell.style.gridRow = `${slot + 1} / ${slot + 3}`;
      timeCell.style.gridColumn = '1';
      grid.appendChild(timeCell);
    }
    visLocs.forEach((loc, locIdx) => {
      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.style.gridRow = `${slot + 1}`;
      cell.style.gridColumn = `${locIdx + 2}`;
      grid.appendChild(cell);
    });
  }

  container.appendChild(grid);

  // Pixel-accurate overlay for both regular events and proposals. This avoids the
  // 30-min grid snapping that would otherwise round, e.g., 18:15 up to 18:30 and
  // make the buffer between an event and a following proposal disappear visually.
  const overlay = document.createElement('div');
  overlay.className = 'day-overlay';
  grid.appendChild(overlay);

  requestAnimationFrame(() => {
    const gridW = grid.offsetWidth;
    const gridH = grid.offsetHeight;
    const timeColW = 60;
    const colW = (gridW - timeColW) / visLocs.length;
    const totalMinutes = (maxHour - minHour) * 60;
    const pxPerMin = gridH / totalMinutes;

    // Regular events
    dayEvents.forEach(ev => {
      if (!visibleLocations.has(ev.Room)) return;
      const locIdx = visLocs.indexOf(ev.Room);
      if (locIdx === -1) return;
      const startMin = timeToMinutes(ev.Start);
      const endMin = timeToMinutes(ev.End);
      const top = (startMin - minHour * 60) * pxPerMin;
      const height = Math.max(18, (endMin - startMin) * pxPerMin);
      const left = timeColW + locIdx * colW + 2;
      const width = colW - 4;
      const block = document.createElement('div');
      block.className = 'event-block';
      block.setAttribute('data-color', getColor(ev.Room));
      block.style.cssText = `position:absolute;top:${top}px;left:${left}px;width:${width}px;height:${height}px;margin:0;`;
      const roomDiv = document.createElement('div');
      roomDiv.className = 'event-room';
      roomDiv.textContent = ev.Room;
      roomDiv.dataset.full = ev.Room;
      roomDiv.dataset.short = getShortName(ev.Room);
      block.appendChild(roomDiv);
      const nameDiv = document.createElement('div');
      nameDiv.className = 'event-name';
      nameDiv.textContent = ev.Class;
      block.appendChild(nameDiv);
      if (height >= 28) {
        const timeDiv = document.createElement('div');
        timeDiv.className = 'event-time';
        timeDiv.textContent = `${ev.Start} – ${ev.End}`;
        block.appendChild(timeDiv);
      }
      if (height >= 50 && ev.Instructor) {
        const instrDiv = document.createElement('div');
        instrDiv.className = 'event-instructor';
        instrDiv.textContent = ev.Instructor;
        block.appendChild(instrDiv);
      }
      block.addEventListener('click', () => showModal(ev));
      overlay.appendChild(block);
    });

    // Compound-search proposals (color-coded + dotted connector lines)
    if (compoundSearchActive && compoundSearchResults.has(currentDate)) {
      const matches = compoundSearchResults.get(currentDate);

      // Pass 1: collect flat list of proposal items
      const items = [];
      matches.forEach((placements, matchIdx) => {
        const color = PROPOSAL_COLORS[matchIdx % PROPOSAL_COLORS.length];
        placements.forEach(p => {
          const locIdx = visLocs.indexOf(p.room);
          if (locIdx === -1) return;
          items.push({ matchIdx, color, locIdx, room: p.room, start: p.start, end: p.end, heatMin: p.heatMin || 0 });
        });
      });

      // Pass 2: within each room, cluster transitively-overlapping items and
      // assign each a sub-column + sub-column count so they sit side-by-side
      // instead of stacking on top of each other.
      const byRoom = new Map();
      items.forEach(it => {
        const arr = byRoom.get(it.room) || [];
        arr.push(it);
        byRoom.set(it.room, arr);
      });
      byRoom.forEach(arr => {
        arr.sort((a, b) => a.start - b.start);
        let cluster = [];
        let clusterEnd = -1;
        const flush = () => {
          if (!cluster.length) return;
          const subColEnds = [];
          cluster.forEach(item => {
            let placed = -1;
            for (let i = 0; i < subColEnds.length; i++) {
              if (subColEnds[i] <= item.start) { subColEnds[i] = item.end; placed = i; break; }
            }
            if (placed === -1) { subColEnds.push(item.end); placed = subColEnds.length - 1; }
            item.subCol = placed;
          });
          const subColCount = subColEnds.length;
          cluster.forEach(item => { item.subColCount = subColCount; });
          cluster = [];
          clusterEnd = -1;
        };
        arr.forEach(item => {
          if (cluster.length && item.start >= clusterEnd) flush();
          cluster.push(item);
          clusterEnd = Math.max(clusterEnd, item.end);
        });
        flush();
      });

      // Pass 3: render DOM blocks per match, tracking match groups for the connector SVG
      const groupMap = new Map();
      items.forEach(it => {
        const subW = colW / it.subColCount;
        const top = (it.start - minHour * 60) * pxPerMin;
        const height = (it.end - it.start) * pxPerMin;
        const left = timeColW + it.locIdx * colW + it.subCol * subW + 2;
        const width = subW - 4;
        const b = document.createElement('div');
        const hasHeat = it.heatMin > 0;
        b.className = 'proposal-block'
          + (it.subColCount > 1 ? ' narrow' : '')
          + (hasHeat ? ' has-heat' : '');
        b.style.cssText = `top:${top}px;height:${height}px;left:${left}px;width:${width}px;--prop-color:${it.color};`;
        if (hasHeat) {
          const heatH = it.heatMin * pxPerMin;
          const useStart = it.start + it.heatMin;
          const useDur = it.end - useStart;
          const isNarrow = it.subColCount > 1;
          const useTimeHTML = isNarrow
            ? `<span class="use-time"><span>${minutesToTime(useStart)}</span><span class="t-sep">–</span><span>${minutesToTime(it.end)}</span></span>`
            : `<span class="use-time">${minutesToTime(useStart)}–${minutesToTime(it.end)}</span>`;
          const useBody = isNarrow
            ? `<span class="use-room">${useDur}m</span><br>${useTimeHTML}`
            : `<span class="use-room">${escapeHtml(it.room)}</span> · ${useDur}m<br>${useTimeHTML}`;
          b.innerHTML = `<span class="match-num">${it.matchIdx + 1}</span>`
            + `<div class="heat-zone" style="height:${heatH}px;"><span class="flame">🔥</span><span>preheat · ${it.heatMin}m</span></div>`
            + `<div class="use-zone">${useBody}</div>`;
        } else {
          const showTime = (it.end - it.start) >= (it.subColCount > 1 ? 45 : 30);
          const timeHTML = showTime
            ? `<div class="proposal-time"><span>${minutesToTime(it.start)}</span><span class="t-sep">–</span><span>${minutesToTime(it.end)}</span></div>`
            : '';
          b.innerHTML = `<span class="match-num">${it.matchIdx + 1}</span>${timeHTML}`;
        }
        b.title = hasHeat
          ? `Proposal ${it.matchIdx + 1} · ${it.room} · ${minutesToTime(it.start + it.heatMin)}–${minutesToTime(it.end)} (${it.heatMin}m preheat + ${it.end - it.start - it.heatMin}m use)`
          : `Proposal ${it.matchIdx + 1} · ${it.room} · ${minutesToTime(it.start)}–${minutesToTime(it.end)}`;
        overlay.appendChild(b);
        const g = groupMap.get(it.matchIdx) || { els: [], color: it.color };
        g.els.push(b);
        groupMap.set(it.matchIdx, g);
      });
      const groups = Array.from(groupMap.values());

      // Dotted connector lines between steps of the same match
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'proposal-svg');
      svg.setAttribute('viewBox', `0 0 ${gridW} ${gridH}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      groups.forEach(({ els, color }) => {
        for (let i = 0; i < els.length - 1; i++) {
          const a = els[i];
          const c = els[i + 1];
          const ax = a.offsetLeft, ay = a.offsetTop, aw = a.offsetWidth, ah = a.offsetHeight;
          const cx = c.offsetLeft, cy = c.offsetTop, cw = c.offsetWidth, ch = c.offsetHeight;
          const sameCol = Math.abs(ax - cx) < 4;
          let x1, y1, x2, y2;
          if (sameCol) {
            x1 = ax + aw / 2; y1 = ay + ah;
            x2 = cx + cw / 2; y2 = cy;
          } else {
            const aIsLeft = ax < cx;
            x1 = aIsLeft ? ax + aw : ax;
            y1 = ay + ah / 2;
            x2 = aIsLeft ? cx : cx + cw;
            y2 = cy + ch / 2;
          }
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const midX = (x1 + x2) / 2;
          path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
          path.setAttribute('class', 'proposal-line');
          path.setAttribute('stroke', color);
          svg.appendChild(path);
        }
      });
      overlay.appendChild(svg);
    }
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- Modal ----------
function showModal(ev) {
  document.getElementById('modal-title').textContent = ev.Class;
  const body = document.getElementById('modal-body');
  const fields = [
    ['Date', `${ev.Day}, ${ev.Date}`],
    ['Time', `${ev.Start} – ${ev.End}`],
    ['Duration', `${ev.Duration_min} min`],
    ['Location', ev.Room],
    ['Instructor', ev.Instructor || '—'],
  ];
  body.innerHTML = fields.map(([label, val]) =>
    `<div class="detail-row"><span class="detail-label">${label}</span><span>${escapeHtml(val)}</span></div>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('show');
}

// ==================== Compound slot search ====================

const PROPOSAL_COLORS = ['#c4a35a', '#5cbfbf', '#bf5c7c', '#5cbf7c', '#bf7c5c', '#9a5cbf'];

function minutesToTime(m) {
  return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
}

// Sauna-specific rules
const SAUNA_PREHEAT_MIN = 60;
const SAUNA_WARM_WINDOW_MIN = 45;
function isSaunaRoom(room) {
  return typeof room === 'string' && room.toLowerCase().includes('sauna');
}

// Return array of free intervals across the given rooms on the given date,
// within timeRange, with the given between-event buffer applied.
function getExactFreeIntervals(date, rooms, timeRange, buffer) {
  const results = [];
  rooms.forEach(room => {
    const roomEvents = events
      .filter(e => e.Date === date && e.Room === room)
      .map(e => ({ start: timeToMinutes(e.Start), end: timeToMinutes(e.End) }))
      .sort((a, b) => a.start - b.start);

    let cursor = timeRange.start;
    roomEvents.forEach(ev => {
      const freeEnd = ev.start - buffer;
      if (freeEnd > cursor) results.push({ room, start: cursor, end: freeEnd });
      cursor = Math.max(cursor, ev.end + buffer);
    });
    if (timeRange.end > cursor) results.push({ room, start: cursor, end: timeRange.end });
  });
  return results;
}

// Sauna is warm at `startMin` if another sauna session (existing event OR earlier
// step in this compound search) ended within SAUNA_WARM_WINDOW_MIN minutes before.
// Non-sauna rooms have no preheat concept.
function isSaunaWarm(date, room, startMin, chainPath) {
  const warmFromExisting = events.some(e => {
    if (e.Date !== date || !isSaunaRoom(e.Room)) return false;
    const endMin = timeToMinutes(e.End);
    return endMin <= startMin && startMin - endMin <= SAUNA_WARM_WINDOW_MIN;
  });
  if (warmFromExisting) return true;
  return chainPath.some(p =>
    isSaunaRoom(p.room) && p.end <= startMin && startMin - p.end <= SAUNA_WARM_WINDOW_MIN
  );
}

function getEffectiveDuration(step, room, startMin, date, chainPath) {
  if (!isSaunaRoom(room)) return step.duration;
  const warm = isSaunaWarm(date, room, startMin, chainPath);
  return warm ? step.duration : step.duration + SAUNA_PREHEAT_MIN;
}

// Generalized N-step sequential placement finder. `transitions[i]` is the max
// allowed minutes between step `i` end and step `i+1` start.
function findSequentialPlacements(freeByStep, steps, transitions, date) {
  const matches = [];
  function walk(stepIdx, prevEnd, path) {
    const intervals = freeByStep[stepIdx];
    const step = steps[stepIdx];
    intervals.forEach(iv => {
      const earliest = stepIdx === 0 ? iv.start : Math.max(iv.start, prevEnd);
      if (stepIdx > 0 && earliest > prevEnd + transitions[stepIdx - 1]) return;
      const dur = getEffectiveDuration(step, iv.room, earliest, date, path);
      if (iv.end - iv.start < dur) return;
      if (earliest + dur > iv.end) return;
      const heatMin = dur - step.duration;
      const placement = { room: iv.room, start: earliest, end: earliest + dur, heatMin };
      const nextPath = path.concat([placement]);
      if (stepIdx === steps.length - 1) matches.push(nextPath);
      else walk(stepIdx + 1, placement.end, nextPath);
    });
  }
  walk(0, 0, []);
  return matches;
}

function findCompoundSlots(config) {
  compoundSearchResults = new Map();
  const today = todayIso();
  const allDates = Array.from(new Set(events.map(e => e.Date))).sort();
  allDates.forEach(date => {
    if (date < today) return; // today-forward only
    const d = parseIso(date);
    const dayName = d.toLocaleDateString('en-US', { weekday: 'long' });
    if (!config.dayFilter.has(dayName)) return;

    const freeByStep = config.steps.map(step =>
      getExactFreeIntervals(date, step.rooms, config.timeRange, config.roomBuffer)
    );

    let matches = findSequentialPlacements(freeByStep, config.steps, config.transitions, date);

    if (config.allowReverse && config.steps.length >= 2) {
      const reversedSteps = config.steps.slice().reverse();
      const reversedFree = freeByStep.slice().reverse();
      const reversedTransitions = config.transitions.slice().reverse();
      const reverseMatches = findSequentialPlacements(reversedFree, reversedSteps, reversedTransitions, date);
      reverseMatches.forEach(m => matches.push(m.slice().reverse()));
    }

    if (matches.length > 0) {
      const seen = new Set();
      const deduped = matches.filter(m => {
        const key = m.map(p => `${p.room}:${p.start}-${p.end}`).join('|');
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      compoundSearchResults.set(date, deduped);
    }
  });
  compoundSearchActive = true;
}

// ---------- Search config persistence ----------
const SEARCH_STORAGE_KEY = 'rort-compound-search';

function readSearchConfig() {
  const container = document.getElementById('find-container');
  const steps = [];
  container.querySelectorAll('.step-card').forEach(el => {
    const rooms = [];
    el.querySelectorAll('.room-tag').forEach(tag => rooms.push(tag.dataset.room));
    const duration = parseInt(el.querySelector('.step-duration').value) || 60;
    if (rooms.length > 0) steps.push({ rooms, duration });
  });

  const transitions = [];
  container.querySelectorAll('.transition-row .step-maxgap').forEach(inp => {
    const v = parseInt(inp.value);
    transitions.push(Number.isFinite(v) ? v : 15);
  });
  // Ensure transitions.length === max(0, steps.length - 1)
  while (transitions.length < steps.length - 1) transitions.push(15);
  transitions.length = Math.max(0, steps.length - 1);

  const topbar = document.getElementById('find-topbar');
  const startH = parseInt(topbar.querySelector('#search-start').value);
  const endH = parseInt(topbar.querySelector('#search-end').value);
  const dayFilter = new Set();
  topbar.querySelectorAll('.day-check input:checked').forEach(cb => dayFilter.add(cb.value));
  const roomBuffer = parseInt(topbar.querySelector('#search-buffer').value) || 15;
  const allowReverse = topbar.querySelector('#search-reverse').checked;

  return { steps, transitions, timeRange: { start: startH * 60, end: endH * 60 }, dayFilter, roomBuffer, allowReverse };
}

function saveSearchConfig(c) {
  try {
    localStorage.setItem(SEARCH_STORAGE_KEY, JSON.stringify({
      steps: c.steps, transitions: c.transitions, timeRange: c.timeRange,
      dayFilter: Array.from(c.dayFilter), roomBuffer: c.roomBuffer, allowReverse: c.allowReverse,
    }));
  } catch (e) { /* quota / private mode — silent */ }
}

function loadSearchConfig() {
  try {
    const raw = localStorage.getItem(SEARCH_STORAGE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    c.dayFilter = new Set(c.dayFilter);
    // Migrate legacy `maxTransition` + per-step `warmup` → per-transition array.
    if (!Array.isArray(c.transitions)) {
      const legacyGap = Number.isFinite(c.maxTransition) ? c.maxTransition : 15;
      const n = Array.isArray(c.steps) ? Math.max(0, c.steps.length - 1) : 0;
      c.transitions = Array(n).fill(legacyGap);
    }
    if (Array.isArray(c.steps)) c.steps.forEach(s => delete s.warmup);
    return c;
  } catch (e) { return null; }
}

// ---------- Find-view UI ----------
function stepHasSauna(rooms) {
  return rooms.some(isSaunaRoom);
}

function buildStepHTML(idx, step) {
  const rooms = step.rooms || [];
  const isSauna = stepHasSauna(rooms);
  const roomTags = rooms.map(r =>
    `<span class="room-tag${isSaunaRoom(r) ? ' sauna' : ''}" data-room="${escapeHtml(r)}">${escapeHtml(r)}<span class="room-tag-x">×</span></span>`
  ).join('');
  const options = '<option value="">+ room</option>' +
    Array.from(visibleLocations).map(loc => `<option value="${escapeHtml(loc)}">${escapeHtml(loc)}</option>`).join('');
  const saunaInfo = isSauna
    ? `<div class="step-info"><span class="sauna-ico">🔥 sauna</span> · needs ${SAUNA_PREHEAT_MIN} min preheat if cold · warm if another sauna session ended ≤${SAUNA_WARM_WINDOW_MIN} min earlier (no preheat needed)</div>`
    : '';
  return `<div class="step-card${isSauna ? ' is-sauna' : ''}" data-step="${idx}">
    <span class="step-num">${idx + 1}</span>
    <div class="step-main">
      <div class="step-line-1">
        <div class="room-tags">${roomTags}</div>
        <select class="room-select">${options}</select>
        <span>for</span>
        <input type="number" class="step-duration" value="${step.duration}" min="15" max="480" step="15"><span>min</span>
      </div>
      ${saunaInfo}
    </div>
    <button class="remove-card" title="Remove step">×</button>
  </div>`;
}

function buildTransitionHTML(gap, nextIdx) {
  const v = Number.isFinite(gap) ? gap : 15;
  return `<div class="transition-row" data-for-step="${nextIdx}">
    <span>↦ then, within</span>
    <input type="number" class="step-maxgap" value="${v}" min="0" max="180" step="5">
    <span>min</span>
    <span class="t-hint">(max gap before step ${nextIdx + 1})</span>
  </div>`;
}

function refreshStepCardSaunaState(stepEl) {
  const rooms = Array.from(stepEl.querySelectorAll('.room-tag')).map(t => t.dataset.room);
  const isSauna = stepHasSauna(rooms);
  stepEl.classList.toggle('is-sauna', isSauna);
  const main = stepEl.querySelector('.step-main');
  let info = main.querySelector('.step-info');
  if (isSauna && !info) {
    info = document.createElement('div');
    info.className = 'step-info';
    info.innerHTML = `<span class="sauna-ico">🔥 sauna</span> · needs ${SAUNA_PREHEAT_MIN} min preheat if cold · warm if another sauna session ended ≤${SAUNA_WARM_WINDOW_MIN} min earlier (no preheat needed)`;
    main.appendChild(info);
  } else if (!isSauna && info) {
    info.remove();
  }
}

function renumberSteps(container) {
  const cards = container.querySelectorAll('.step-card');
  cards.forEach((card, i) => {
    card.dataset.step = i;
    const num = card.querySelector('.step-num');
    if (num) num.textContent = String(i + 1);
  });
  container.querySelectorAll('.transition-row').forEach((row, i) => {
    row.dataset.forStep = i + 1;
    const hint = row.querySelector('.t-hint');
    if (hint) hint.textContent = `(max gap before step ${i + 2})`;
  });
}

function wireStepEvents(stepEl) {
  const select = stepEl.querySelector('.room-select');
  const tagsContainer = stepEl.querySelector('.room-tags');
  select.addEventListener('change', () => {
    const val = select.value;
    select.value = '';
    if (!val) return;
    if (stepEl.querySelector(`.room-tag[data-room="${CSS.escape(val)}"]`)) return;
    const tag = document.createElement('span');
    tag.className = 'room-tag' + (isSaunaRoom(val) ? ' sauna' : '');
    tag.dataset.room = val;
    tag.innerHTML = `${escapeHtml(val)}<span class="room-tag-x">×</span>`;
    tag.querySelector('.room-tag-x').addEventListener('click', () => {
      tag.remove();
      refreshStepCardSaunaState(stepEl);
    });
    tagsContainer.appendChild(tag);
    refreshStepCardSaunaState(stepEl);
  });
  stepEl.querySelectorAll('.room-tag .room-tag-x').forEach(x => {
    x.addEventListener('click', () => {
      x.parentElement.remove();
      refreshStepCardSaunaState(stepEl);
    });
  });
  const rm = stepEl.querySelector('.remove-card');
  if (rm) {
    rm.addEventListener('click', () => {
      const container = document.getElementById('find-steps');
      const cards = Array.from(container.querySelectorAll('.step-card'));
      if (cards.length <= 1) return; // keep at least one step
      const idx = cards.indexOf(stepEl);
      // Remove the associated transition row (preceding for non-first, following for first).
      const trans = Array.from(container.querySelectorAll('.transition-row'));
      if (idx === 0 && trans.length > 0) trans[0].remove();
      else if (idx > 0 && trans[idx - 1]) trans[idx - 1].remove();
      stepEl.remove();
      renumberSteps(container);
    });
  }
}

function buildSummaryHTML(cfg) {
  if (!cfg || !cfg.steps || cfg.steps.length === 0) return '';
  const parts = [];
  cfg.steps.forEach((s, i) => {
    if (i > 0) {
      const gap = cfg.transitions[i - 1];
      parts.push(`<span class="sum-arrow">↦ ${Number.isFinite(gap) ? gap : 15}m</span>`);
    }
    const sauna = stepHasSauna(s.rooms);
    const tags = s.rooms.map(r =>
      `<span class="room-tag${isSaunaRoom(r) ? ' sauna' : ''}">${escapeHtml(r)}</span>`
    ).join(' ');
    parts.push(`<span class="sum-step">${tags} <span style="color:var(--text-muted);font-size:11px;">${s.duration}m</span></span>`);
  });
  return parts.join(' ');
}

function refreshSummary() {
  const sum = document.getElementById('find-summary-steps');
  if (!sum) return;
  const cfg = readSearchConfig();
  sum.innerHTML = buildSummaryHTML(cfg);
}

function setFindCollapsed(collapsed) {
  const container = document.getElementById('find-container');
  if (!container) return;
  if (collapsed) refreshSummary();
  container.classList.toggle('collapsed', collapsed);
}

function initializeFindView() {
  const container = document.getElementById('find-container');
  const saved = loadSearchConfig();
  const defaultSteps = (saved && saved.steps.length) ? saved.steps : [
    { rooms: [], duration: 90 },
    { rooms: [], duration: 60 },
  ];
  const defaultTransitions = (saved && Array.isArray(saved.transitions))
    ? saved.transitions
    : Array(Math.max(0, defaultSteps.length - 1)).fill(15);
  const defaultStart = saved ? Math.floor(saved.timeRange.start / 60) : 16;
  const defaultEnd = saved ? Math.ceil(saved.timeRange.end / 60) : 22;
  const defaultBuffer = saved ? saved.roomBuffer : 15;
  const defaultReverse = saved ? saved.allowReverse : false;
  const defaultDays = saved ? saved.dayFilter : new Set(['Monday','Tuesday','Wednesday','Thursday','Friday']);

  // Interleave step cards with transition rows
  const stepsHTML = defaultSteps.map((s, i) => {
    const card = buildStepHTML(i, s);
    if (i === 0) return card;
    const gap = defaultTransitions[i - 1];
    return buildTransitionHTML(gap, i) + card;
  }).join('');

  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayAbbrev = ['Mo','Tu','We','Th','Fr','Sa','Su'];
  const dowHTML = dayNames.map((d, i) => {
    const on = defaultDays.has(d) ? ' checked' : '';
    return `<label class="day-check"><input type="checkbox" value="${d}"${on}><span>${dayAbbrev[i]}</span></label>`;
  }).join('');

  const startOpts = Array.from({length: 24}, (_, h) =>
    `<option value="${h}"${h === defaultStart ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`
  ).join('');
  const endOpts = Array.from({length: 24}, (_, i) => {
    const h = i + 1;
    return `<option value="${h}"${h === defaultEnd ? ' selected' : ''}>${String(h).padStart(2,'0')}:00</option>`;
  }).join('');

  container.innerHTML = `
    <div class="find-topbar" id="find-topbar">
      <div class="filter-row">
        <span class="fl">Time</span>
        <select id="search-start">${startOpts}</select>
        <span>–</span>
        <select id="search-end">${endOpts}</select>
        <span class="divider"></span>
        <div class="day-checks">${dowHTML}</div>
        <span class="divider"></span>
        <span class="fl">Buffer</span>
        <input type="number" id="search-buffer" value="${defaultBuffer}" min="0" max="60"><span>m</span>
        <label class="reverse-check"><input type="checkbox" id="search-reverse"${defaultReverse ? ' checked' : ''}> Allow reverse</label>
        <span class="spacer"></span>
        <button class="search-btn" id="search-btn">Search</button>
        <span class="clear-link" id="search-clear-btn">Clear</span>
      </div>
    </div>

    <div class="steps-col" id="find-steps">
      ${stepsHTML}
      <div class="steps-footer">
        <button class="add-step" id="add-step-btn">+ add step</button>
        <button class="collapse-handle" id="collapse-steps-btn" title="Hide steps"><span>Hide steps</span><span class="chev">▲</span></button>
      </div>
    </div>

    <div class="find-summary" id="find-summary">
      <div class="summary-steps" id="find-summary-steps"></div>
      <span class="summary-spacer"></span>
      <button class="expand-chev" id="expand-steps-btn" title="Edit steps"><span>Edit steps</span><span class="chev">▼</span></button>
    </div>

    <div class="list-scope">
      <span style="color:var(--text-muted);font-size:12px;">Show:</span>
      <div class="scope-tabs" id="scope-tabs">
        <span data-scope="week"${searchScope === 'week' ? ' class="on"' : ''}>This week</span>
        <span data-scope="2weeks"${searchScope === '2weeks' ? ' class="on"' : ''}>Next 2 weeks</span>
        <span data-scope="all"${searchScope === 'all' ? ' class="on"' : ''}>All</span>

    // Insert transition row before the new card (since idx > 0 now).
    const transWrap = document.createElement('div');
    transWrap.innerHTML = buildTransitionHTML(15, idx);
    stepsContainer.insertBefore(transWrap.firstElementChild, footer);
    const cardWrap = document.createElement('div');

function renderResultsList() {
  const root = document.getElementById('find-results');
  const countEl = document.getElementById('search-count');
  if (!compoundSearchActive) {
    root.innerHTML = '<div class="results-empty">Configure your search and click Search.</div>';
    countEl.textContent = '';
    return;
  }

  const today = todayIso();
  let endCutoff;
  if (searchScope === 'week') {
    const d = parseIso(today);
    const dow = (d.getDay() + 6) % 7; // Mon=0
    endCutoff = addDays(today, 6 - dow);
  } else if (searchScope === '2weeks') {
    endCutoff = addDays(today, 13);
  } else {
    endCutoff = '9999-12-31';
  }

  const sortedDates = Array.from(compoundSearchResults.keys())
    .filter(d => d >= today && d <= endCutoff)
    .sort();

  let totalMatches = 0;
  sortedDates.forEach(d => { totalMatches += compoundSearchResults.get(d).length; });
  countEl.textContent = totalMatches > 0 ? `★ ${totalMatches} match${totalMatches === 1 ? '' : 'es'}` : '';

  if (sortedDates.length === 0) {
    root.innerHTML = '<div class="results-empty">No matches in the selected range. Try a wider scope or adjust filters.</div>';
    return;
  }

  root.innerHTML = sortedDates.map(date => {
    const matches = compoundSearchResults.get(date);
    const d = parseIso(date);
    const dow = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
    const dt = d.getDate();
    const mon = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
    const isToday = date === today;
    const todayBadge = isToday ? '<span class="today-badge">TODAY</span>' : '';
    const rows = matches.map(m => {
      const first = m[0];
      const last = m[m.length - 1];
      const timeLabel = `${minutesToTime(first.start)} → ${minutesToTime(last.end)}`;
      const flow = m.map(p => `<span class="room-pill">${escapeHtml(p.room)}</span>`)
        .join('<span class="sep">→</span>');
      const durs = m.map(p => `${p.end - p.start}m`).join(' + ');
      return `<div class="match-row" data-date="${date}"><span class="arrow">→</span><span class="time">${timeLabel}</span><span class="flow">${flow}</span><span class="dur">${durs}</span><span class="goto">›</span></div>`;
    }).join('');
    return `<div class="day-group${isToday ? ' today' : ''}">
      <div class="day-head"><span class="dow">${dow}</span><span class="dt">${dt} ${mon}</span>${todayBadge}<span class="count-badge">${matches.length} ${matches.length === 1 ? 'option' : 'options'}</span></div>
      ${rows}
    </div>`;
  }).join('');

  root.querySelectorAll('.match-row').forEach(row => {
    row.addEventListener('click', () => {
      currentDate = row.dataset.date;
      sidebarMonth = firstOfMonth(currentDate);
      viewMode = 'day';
      render();
    });
  });
}

function renderFindView() {
  if (!findViewInitialized) {
    initializeFindView();
    findViewInitialized = true;
  }
  renderResultsList();
}

// ---------- Dev tests (?test=1) ----------
function runTests() {
  const origEvents = events;
  let passed = 0, failed = 0;
  const assert = (name, cond) => {
    if (cond) { passed++; console.log('✓', name); }
    else { failed++; console.error('✗', name); }
  };

  // getExactFreeIntervals
  events = [];
  let free = getExactFreeIntervals('2099-01-01', ['Studio 1'], { start: 960, end: 1320 }, 15);
  assert('Empty day → single full interval',
    free.length === 1 && free[0].start === 960 && free[0].end === 1320);

  events = [{ Date: '2099-01-01', Room: 'Studio 1', Start: '17:00', End: '18:00' }];
  free = getExactFreeIntervals('2099-01-01', ['Studio 1'], { start: 960, end: 1320 }, 15);
  assert('Event mid-range → 2 intervals',
    free.length === 2 && free[0].end === 1020 - 15 && free[1].start === 1080 + 15);

  // Non-sauna: no warmup ever
  events = [];
  assert('Non-sauna duration is step.duration',
    getEffectiveDuration({ duration: 60 }, 'Studio 1', 600, '2099-01-01', []) === 60);

  // Sauna cold: +60 preheat
  events = [];
  assert('Sauna cold adds 60 min preheat',
    getEffectiveDuration({ duration: 60 }, 'Sauna', 600, '2099-01-01', []) === 120);

  // Sauna warm via existing event within 45 min
  events = [{ Date: '2099-01-01', Room: 'Sauna', Start: '09:00', End: '09:30' }];
  assert('Sauna warm (existing event ended 30 min prior, within 45)',
    getEffectiveDuration({ duration: 60 }, 'Sauna', 600, '2099-01-01', []) === 60);

  events = [{ Date: '2099-01-01', Room: 'Sauna', Start: '08:00', End: '09:00' }];
  assert('Sauna cold (prev ended 60 min prior, outside 45)',
    getEffectiveDuration({ duration: 60 }, 'Sauna', 600, '2099-01-01', []) === 120);

  // Sauna warm via chain (prior step in same compound search)
  events = [];
  const chain = [{ room: 'Sauna', start: 500, end: 580 }];
  assert('Sauna warm via chain (prior step ended 20 min prior)',
    getEffectiveDuration({ duration: 60 }, 'Sauna', 600, '2099-01-01', chain) === 60);

  // findSequentialPlacements with transitions array
  events = [];
  let steps = [{ rooms: ['A'], duration: 60 }];
  let fbs = [[{ room: 'A', start: 0, end: 120 }]];
  let matches = findSequentialPlacements(fbs, steps, [], '2099-01-01');
  assert('1-step: 1 match', matches.length === 1 && matches[0][0].end === 60);

  steps = [
    { rooms: ['A'], duration: 60 },
    { rooms: ['B'], duration: 30 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 90 }],
    [{ room: 'B', start: 60, end: 120 }],
  ];
  matches = findSequentialPlacements(fbs, steps, [15], '2099-01-01');
  assert('2-step: 1 match back-to-back',
    matches.length === 1 && matches[0][1].start === 60);

  // 3-step regression
  steps = [
    { rooms: ['A'], duration: 30 },
    { rooms: ['B'], duration: 30 },
    { rooms: ['C'], duration: 30 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 30 }],
    [{ room: 'B', start: 30, end: 60 }],
    [{ room: 'C', start: 60, end: 90 }],
  ];
  matches = findSequentialPlacements(fbs, steps, [15, 15], '2099-01-01');
  assert('3-step: works with N=3 (regression)',
    matches.length === 1 && matches[0].length === 3 && matches[0][2].end === 90);

  // Per-transition max gap — different limits between pairs
  steps = [
    { rooms: ['A'], duration: 30 },
    { rooms: ['B'], duration: 30 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 30 }],
    [{ room: 'B', start: 50, end: 100 }],
  ];
  matches = findSequentialPlacements(fbs, steps, [15], '2099-01-01');
  assert('per-step gap 15: 20-min gap does NOT match', matches.length === 0);
  matches = findSequentialPlacements(fbs, steps, [30], '2099-01-01');
  assert('per-step gap 30: 20-min gap DOES match', matches.length === 1);

  // Per-transition: 1→2 tight, 2→3 loose
  steps = [
    { rooms: ['A'], duration: 30 },
    { rooms: ['B'], duration: 30 },
    { rooms: ['C'], duration: 30 },
  ];
  fbs = [
    [{ room: 'A', start: 0, end: 30 }],
    [{ room: 'B', start: 30, end: 60 }],
    [{ room: 'C', start: 120, end: 160 }],
  ];
  matches = findSequentialPlacements(fbs, steps, [15, 60], '2099-01-01');
  assert('per-transition [15,60]: 60-min gap to step 3 matches',
    matches.length === 1 && matches[0][2].start === 120);
  matches = findSequentialPlacements(fbs, steps, [15, 30], '2099-01-01');
  assert('per-transition [15,30]: 60-min gap to step 3 does NOT match',
    matches.length === 0);

  events = origEvents;
  console.log(`\nTests: ${passed} passed, ${failed} failed`);
  if (failed === 0) console.log('ALL TESTS PASSED ✓');
}

// ---------- Event wiring ----------
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('show');
});
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modal-overlay').classList.remove('show');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').classList.remove('show');
    closeLocationSettings();
  }
  const modalOpen = document.querySelector('.modal-overlay.show');
  const popOpen = document.getElementById('loc-settings-popover').classList.contains('show');
  if (!modalOpen && !popOpen && e.target.tagName !== 'INPUT') {
    if (e.key === 'ArrowLeft') document.getElementById('prev-range').click();
    if (e.key === 'ArrowRight') document.getElementById('next-range').click();
  }
});
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(applyTightNames, 100);
});

// Sidebar month nav
document.getElementById('prev-month').addEventListener('click', () => {
  sidebarMonth = addMonths(sidebarMonth, -1);
  renderMiniCal();
});
document.getElementById('next-month').addEventListener('click', () => {
  sidebarMonth = addMonths(sidebarMonth, 1);
  renderMiniCal();
});

// Range navigation
document.getElementById('prev-range').addEventListener('click', () => {
  if (viewMode === 'find') return;
  currentDate = addDays(currentDate, viewMode === 'week' ? -7 : -1);
  sidebarMonth = firstOfMonth(currentDate);
  render();
});
document.getElementById('next-range').addEventListener('click', () => {
  if (viewMode === 'find') return;
  currentDate = addDays(currentDate, viewMode === 'week' ? 7 : 1);
  sidebarMonth = firstOfMonth(currentDate);
  render();
});
document.getElementById('today-btn').addEventListener('click', () => {
  currentDate = todayIso();
  sidebarMonth = firstOfMonth(currentDate);
  render();
});

// View mode toggle
document.querySelectorAll('.view-mode button').forEach(btn => {
  btn.addEventListener('click', () => {
    viewMode = btn.dataset.mode;
    render();
  });
});

// CSV upload
document.getElementById('csv-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => addEvents(parseCSV(ev.target.result));
  reader.readAsText(file);
  e.target.value = '';
});

// ---------- Init ----------
if (location.search.includes('test=1')) runTests();
render();
loadInitialData();
</script>
