name: Scrape Rört schedule

on:
  schedule:
    # 02:00 UTC daily = 03:00 Copenhagen (winter) / 04:00 (summer).
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-schedule
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/scrape-rort.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No schedule changes."
          else
            git commit -m "chore(schedule): refresh from Yogo API"
            git push
          fi
